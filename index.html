                runners.push({
                    member: m, mesh: group, kart, nameTag, wheels, laneOffset,
                    position: -zOffset, speed: baseSpd, baseSpeed: baseSpd,
                    targetSpdMult: 1.0, currentSpdMult: 1.0, multTimer: 0, 
                    finished: false, retired: false, retired_fully: false, finishTimeStr: null, finishTimeRaw: null,
                    lap: 1, targetDist: trackLength * selectedLaps,
                    state: 'normal', stateTimer: 0, crashDirection: 1, spinAngle: 0, towedProgress: 0, particles: []
                });
                
                updateRunnerTransform(runners[runners.length-1]);
            });
        }

        function updateRunnerTransform(r) {
            if (isNaN(r.position)) r.position = 0;
            let prog = (r.position % trackLength) / trackLength;
            if (isNaN(prog)) prog = 0;
            if (prog < 0) prog += 1;
            prog = Math.max(0, Math.min(1, prog)); 

            const p = trackCurve.getPointAt(prog);
            const t = trackCurve.getTangentAt(prog);
            if (!p || !t) return; 
            const n = new THREE.Vector3(t.z, 0, -t.x).normalize();
            
            p.add(n.multiplyScalar(r.laneOffset || 0));
            r.mesh.position.x = p.x;
            r.mesh.position.z = p.z;
            
            if (r.state !== 'crashed_wall' && r.state !== 'towed') {
                r.mesh.position.y = 0.1; 
            }
            
            r.mesh.lookAt(p.clone().add(t));
            
            // 크래시 스핀 360도 이펙트 (회전)
            if (r.state === 'crashing' || r.state === 'crashed_wall') {
                r.mesh.rotateY(r.spinAngle || 0);
            }

            r.nameTag.lookAt(camera.position);
        }

        function initMinimap() {
            ui.minimapCanvas.width = mmSize; ui.minimapCanvas.height = mmSize;
            mmCtx = ui.minimapCanvas.getContext('2d');
            
            let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
            const pts = trackCurve.getSpacedPoints(100);
            pts.forEach(p => {
                if(p.x < minX) minX=p.x; if(p.x > maxX) maxX=p.x;
                if(p.z < minZ) minZ=p.z; if(p.z > maxZ) maxZ=p.z;
            });
            trackBounds.minX = minX; trackBounds.maxX = maxX;
            trackBounds.minZ = minZ; trackBounds.maxZ = maxZ;
            
            const w = maxX - minX; const h = maxZ - minZ;
            const pad = 20;
            trackBounds.scale = Math.min((mmSize - pad*2)/w, (mmSize - pad*2)/h);
            trackBounds.cx = (minX + maxX)/2;
            trackBounds.cz = (minZ + maxZ)/2;
        }

        function drawMinimap() {
            if (!mmCtx) return;
            mmCtx.clearRect(0, 0, mmSize, mmSize);
            
            const cx = mmSize/2; const cy = mmSize/2; const scale = trackBounds.scale;
            
            mmCtx.beginPath();
            const pts = trackCurve.getSpacedPoints(100);
            pts.forEach((p, i) => {
                const px = cx + (p.x - trackBounds.cx) * scale;
                const py = cy + (p.z - trackBounds.cz) * scale;
                if(i===0) mmCtx.moveTo(px, py); else mmCtx.lineTo(px, py);
            });
            mmCtx.closePath();
            mmCtx.strokeStyle = '#555'; mmCtx.lineWidth = 10; mmCtx.stroke();
            mmCtx.strokeStyle = '#fff'; mmCtx.lineWidth = 2; mmCtx.stroke();

            const p0 = trackCurve.getPointAt(0);
            const px0 = cx + (p0.x - trackBounds.cx) * scale;
            const py0 = cy + (p0.z - trackBounds.cz) * scale;
            mmCtx.fillStyle = '#acfef8'; mmCtx.fillRect(px0-3, py0-3, 6, 6);

            const sorted = getSorted();
            [...sorted].reverse().forEach(r => {
                if(r.retired_fully) return; 
                let prog = (r.position % trackLength) / trackLength;
                if (isNaN(prog)) prog = 0;
                if (prog < 0) prog += 1;
                prog = Math.max(0, Math.min(1, prog));
                
                const p = trackCurve.getPointAt(prog);
                if (!p) return;
                const px = cx + (p.x - trackBounds.cx) * scale;
                const py = cy + (p.z - trackBounds.cz) * scale;
                
                mmCtx.beginPath(); mmCtx.arc(px, py, 4, 0, Math.PI*2);
                mmCtx.fillStyle = r.retired ? '#555' : r.member.color;
                mmCtx.fill();
                mmCtx.lineWidth = 1; mmCtx.strokeStyle = '#000'; mmCtx.stroke();
            });
        }

        function showCenterAlert(text, color = '#fff', duration = 2000) {
            ui.centerText.textContent = text;
            ui.centerText.style.color = color;
            ui.centerAlert.classList.remove('hidden');
            setTimeout(() => { ui.centerAlert.classList.add('hidden'); }, duration);
        }

        function showToast(tag, msg, type = 'red') {
            const div = document.createElement('div');
            div.className = `ea-toast toast-${type}`;
            div.innerHTML = `
                <div class="ea-toast-inner">
                    <div class="ea-toast-tag ea-font-black">${tag}</div>
                    <div class="ea-toast-msg ea-font">${msg}</div>
                </div>
            `;
            ui.toastContainer.appendChild(div);
            setTimeout(() => {
                div.style.opacity = 0; div.style.transform = 'skewX(-15deg) translateY(20px)';
                setTimeout(() => div.remove(), 400);
            }, 3500);
        }

        function setEventFocus(targets, duration) {
            activeEventTargets = targets.filter(r => r && !r.finished);
            if(activeEventTargets.length > 0) {
                eventFocusTimer = duration;
                cameraMode = 'event';
            }
        }

        function runStartAnimation() {
            const p0 = trackCurve.getPointAt(0);
            const t0 = trackCurve.getTangentAt(0);
            
            // 카메라를 선수들 뒤 바닥 가까이에 두고 하늘에 있는 신호등을 집중적으로 올려다보게 함
            const startPos = p0.clone().sub(t0.clone().multiplyScalar(40)).add(new THREE.Vector3(0, 5, 0));
            const endPos = p0.clone().sub(t0.clone().multiplyScalar(25)).add(new THREE.Vector3(0, 3, 0)); 
            const gantryTarget = p0.clone().add(new THREE.Vector3(0, 22, 0)); 
            
            window._camTargetPos.copy(startPos);
            window._camLookAtPos.copy(gantryTarget);
            camera.position.copy(startPos); 
            camera.lookAt(gantryTarget);

            let lightState = 0;
            const startTime = performance.now();
            
            function sweep() {
                if(gamePaused) {
                    requestAnimationFrame(sweep);
                    return;
                }
                const prog = Math.min((performance.now() - startTime) / 6000, 1);
                camera.position.lerpVectors(startPos, endPos, prog);
                camera.lookAt(gantryTarget);
                renderer.render(scene, camera);
                
                const elapsed = performance.now() - startTime;
                if (elapsed > 1000 && lightState === 0) { lightState=1; window._startLights[0].material.color.setHex(0xff2222); playSound('beep'); }
                if (elapsed > 2000 && lightState === 1) { lightState=2; window._startLights[1].material.color.setHex(0xff2222); playSound('beep'); }
                if (elapsed > 3000 && lightState === 2) { lightState=3; window._startLights[2].material.color.setHex(0xff2222); playSound('beep'); }
                if (elapsed > 4000 && lightState === 3) { lightState=4; window._startLights[3].material.color.setHex(0xff2222); playSound('beep'); }
                if (elapsed > 5000 && lightState === 4) { lightState=5; window._startLights[4].material.color.setHex(0xff2222); playSound('beep'); }
                
                if (prog < 1) requestAnimationFrame(sweep);
                else {
                    window._startLights.forEach(l => l.material.color.setHex(0x110000)); 
                    showCenterAlert('GO!', '#22c55e', 1500);
                    playSound('beep_high');
                    startEngineSound();
                    
                    raceStarted = true; 
                    startingSequence = false;
                    ui.lbContainer.style.opacity = '1';
                    ui.raceTimerDisplay.style.opacity = '1'; 
                    lastTime = performance.now();
                    
                    window._smoothLeaderPos = 0;
                    cameraMode = 'follow'; 
                }
            }
            sweep();
        }

        function triggerPlannedDNF(r) {
            r.retired = true;
            r.state = 'crashing';
            r.crashDirection = Math.random() > 0.5 ? 1 : -1;
            r.spinAngle = 0;
            // 랩타임 DNF 고정
            r.finishTimeStr = 'DNF';
            r.finishTimeRaw = Infinity;
            playSound('beep_high');
            showToast('차량 고장 (CRASH)', `${r.member.name} 단독 사고, 스핀아웃!`, 'red');
            emitParticles(r, 0x333333, 10);
            setEventFocus([r], 3.0);
        }

        function triggerF1DoubleCrash() {
            const active = runners.filter(r => !r.finished && !r.retired && r.state === 'normal').sort((a,b)=>b.position - a.position);
            if(active.length < 2) return;
            
            let minD = Infinity, r1 = active[0], r2 = active[1];
            for(let i=0; i<active.length-1; i++) {
                const d = active[i].position - active[i+1].position;
                if(d < minD) { minD = d; r1 = active[i]; r2 = active[i+1]; }
            }
            
            r1.retired = true; r1.state = 'crashing'; r1.crashDirection = 1; r1.spinAngle = 0; r1.finishTimeStr = 'DNF'; r1.finishTimeRaw = Infinity;
            r2.retired = true; r2.state = 'crashing'; r2.crashDirection = -1; r2.spinAngle = 0; r2.finishTimeStr = 'DNF'; r2.finishTimeRaw = Infinity;
            playSound('crash');
            showToast('차량 충돌 (CRASH)', `${r1.member.name} & ${r2.member.name} 연쇄 추돌!`, 'red');
            setEventFocus([r1, r2], 4.0);
        }

        function emitParticles(r, colorHex, count) {
            for(let i=0; i<count; i++) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4), new THREE.MeshBasicMaterial({color: colorHex, transparent: true, opacity: 0.8}));
                m.position.set((Math.random()-0.5)*2, 0.5, -1.5);
                r.kart.add(m); r.particles.push({ m, life: Math.random(), isSmoke: colorHex === 0x333333 });
            }
        }

        function updateParticles(r, gameDelta) {
            r.particles.forEach(p => {
                p.life += gameDelta * 1.5; if(p.life > 1) p.life = 0;
                if(p.isSmoke) {
                    p.m.position.z = -1.5 - p.life * 4; p.m.position.y = 0.5 + p.life * 3;
                    p.m.scale.setScalar(1 + p.life*2); p.m.material.opacity = 0.8 * (1 - p.life);
                } else {
                    p.m.position.z = -1.5 - p.life * 5; p.m.scale.setScalar(1 - p.life);
                }
            });
        }

        function setKartOpacity(kart, opacity) {
            kart.traverse(child => {
                if (child.isMesh) {
                    if (!child.material.isClonedForOpacity) {
                        if (Array.isArray(child.material)) {
                            child.material = child.material.map(m => {
                                const newMat = m.clone(); newMat.transparent = true; newMat.isClonedForOpacity = true; return newMat;
                            });
                        } else {
                            child.material = child.material.clone();
                            child.material.transparent = true;
                            child.material.isClonedForOpacity = true;
                        }
                    }
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.opacity = opacity);
                    } else {
                        child.material.opacity = opacity;
                    }
                }
            });
        }

        function animateLoop(time) {
            if (typeof time !== 'number') time = performance.now();
            if (!gameRunning) return;
            
            if (gamePaused) {
                lastTime = time;
                requestAnimationFrame(animateLoop);
                return;
            }

            let rawDelta = (time - lastTime) / 1000;
            if (isNaN(rawDelta) || rawDelta <= 0) rawDelta = 0.016; 
            
            const realDelta = Math.min(rawDelta, 0.1);
            lastTime = time;

            let currentTargetTimeScale = isFastForwarding ? 4.0 : 1.0;
            
            window._actualTimeScale += (currentTargetTimeScale - window._actualTimeScale) * 0.1;
            const gameDelta = realDelta * window._actualTimeScale;

            if (raceStarted && !raceEnded) {
                gameTime += gameDelta;
                raceTimer += realDelta; 
                ui.raceTimerDisplay.textContent = formatTime(raceTimer);
                
                let maxPos = 0;
                let leaderSpeed = 0;

                runners.forEach(r => {
                    if (r.retired_fully) return;

                    if (r.retired) {
                        if (r.state === 'crashing') {
                            r.laneOffset += r.crashDirection * gameDelta * 50; 
                            r.speed = Math.max(0, r.speed - gameDelta * 60); 
                            r.position += r.speed * gameDelta;
                            r.spinAngle += gameDelta * 20; 
                            
                            const maxOffset = trackWidth / 2 - 1.0; 
                            if (Math.abs(r.laneOffset) >= maxOffset) {
                                r.laneOffset = Math.sign(r.laneOffset) * maxOffset;
                                r.speed = 0;
                                r.state = 'crashed_wall';
                                playSound('crash'); 
                                emitParticles(r, 0xffaa00, 40); 
                                emitParticles(r, 0x333333, 50); 
                            }
                            updateRunnerTransform(r);
                        } else if (r.state === 'crashed_wall') {
                            r.towedProgress += gameDelta * 0.4;
                            setKartOpacity(r.kart, 1 - r.towedProgress);
                            r.nameTag.material.opacity = 1 - r.towedProgress;

                            if (r.towedProgress >= 1) {
                                r.retired_fully = true;
                                r.mesh.visible = false;
                            }
                            updateRunnerTransform(r);
                        } else {
                            r.speed = Math.max(0, r.speed - gameDelta * 30);
                            r.position += r.speed * gameDelta;
                            updateRunnerTransform(r);
                        }
                    } else if (!r.finished) {
                        if (r.state === 'puncture') {
                            r.stateTimer -= gameDelta;
                            if (r.stateTimer <= 0) { r.state = 'normal'; r.targetSpdMult = 1.0; }
                        } else {
                            r.multTimer -= gameDelta;
                            if(r.multTimer <= 0) {
                                r.multTimer = 0.5 + Math.random() * 2.0; 
                                r.targetSpdMult = 0.85 + Math.random() * 0.35; 
                            }
                        }
                        
                        r.currentSpdMult += (r.targetSpdMult - r.currentSpdMult) * gameDelta * 3.0; 
                        const actualSpeed = r.speed * r.currentSpdMult;
                        r.position += actualSpeed * gameDelta;
                        
                        maxPos = Math.max(maxPos, r.position);
                        if(r.position === maxPos) leaderSpeed = actualSpeed;

                        r.lap = Math.floor(Math.max(0, r.position) / trackLength) + 1;

                        if (r.position >= r.targetDist) {
                            r.finished = true; 
                            r.finishTimeRaw = raceTimer;
                            r.finishTimeStr = formatTime(raceTimer); 
                            r.speed = r.baseSpeed * 0.5; 
                        }
                        updateRunnerTransform(r);
                    } else {
                        r.position += r.speed * gameDelta;
                        r.speed = Math.max(0, r.speed - gameDelta * 10);
                        updateRunnerTransform(r);
                    }
                    
                    if(!r.retired_fully) {
                        r.wheels.forEach(w => w.rotation.x -= (r.speed * r.currentSpdMult || r.speed) * gameDelta * 0.4);
                        updateParticles(r, gameDelta);
                    }
                });
                
                updateEngineSound(leaderSpeed);

                dnfSchedule.forEach(evt => {
                    if (!evt.triggered && maxPos > evt.pos) {
                        evt.triggered = true;
                        if(evt.type === 'double') {
                            triggerF1DoubleCrash(); 
                        } else if (evt.type === 'puncture') {
                            const active = runners.filter(r => !r.finished && !r.retired && r.state === 'normal');
                            if (active.length > 0) {
                                const r = active[Math.floor(Math.random() * active.length)];
                                r.state = 'puncture'; r.stateTimer = 5.0; 
                                r.currentSpdMult = 0.3; r.targetSpdMult = 0.3;
                                showToast('타이어 펑크 (PUNCTURE)', `${r.member.name} 타이어 파손 - 속도 급감!`, 'yellow');
                                emitParticles(r, 0xdddddd, 20); 
                                setEventFocus([r], 3.0);
                            }
                        } else if (evt.type === 'single') {
                            const active = runners.filter(r => !r.finished && !r.retired && r.state === 'normal').sort((a,b)=>a.position - b.position);
                            if (active.length > 0) {
                                const targetIdx = Math.floor(Math.random() * Math.min(2, active.length)); // 하위권 중 1명
                                triggerPlannedDNF(active[targetIdx]);
                            }
                        }
                    }
                });

                const leaderLap = Math.min(selectedLaps, Math.floor(Math.max(0, maxPos) / trackLength) + 1);
                ui.lapInfo.textContent = `LAP ${leaderLap}/${selectedLaps}`;
                ui.minimapLapText.textContent = `L${leaderLap}`;

                // 카메라 로직
                const activeRunners = runners.filter(r => !r.retired_fully);
                const racingPack = activeRunners.filter(r => !r.finished);
                let actualLeader;
                if (racingPack.length > 0) {
                    actualLeader = racingPack.reduce((a,b) => a.position > b.position ? a : b);
                } else {
                    actualLeader = activeRunners.length > 0 ? activeRunners.reduce((a,b) => a.position > b.position ? a : b) : runners[0];
                }

                let currentPackLeaderPos = actualLeader ? actualLeader.position : 0;
                let forceCameraCut = false;

                if (window._prevPackLeader !== actualLeader) {
                    forceCameraCut = true;
                }
                window._prevPackLeader = actualLeader;

                const tPos = new THREE.Vector3();
                const lPos = new THREE.Vector3();

                if (eventFocusTimer > 0 && activeEventTargets.length > 0) {
                    eventFocusTimer -= realDelta; 
                    let cx = 0, cy = 0, cz = 0;
                    activeEventTargets.forEach(t => { cx += t.mesh.position.x; cy += t.mesh.position.y; cz += t.mesh.position.z; });
                    cx /= activeEventTargets.length; cy /= activeEventTargets.length; cz /= activeEventTargets.length;
                    const midPos = new THREE.Vector3(cx, cy, cz);

                    const eventLeader = activeEventTargets[0];
                    let cProg = (eventLeader.position % trackLength) / trackLength; 
                    if(isNaN(cProg)) cProg=0;
                    if(cProg<0) cProg+=1;
                    cProg = Math.max(0, Math.min(1, cProg));
                    const ct = trackCurve.getTangentAt(cProg);
                    if(ct) {
                        const cn = new THREE.Vector3(ct.z, 0, -ct.x).normalize();
                        const camSide = Math.sign(eventLeader.laneOffset || 1);
                        tPos.copy(midPos).add(cn.multiplyScalar(-camSide * 40)).add(new THREE.Vector3(0, 15, 0));
                        lPos.copy(midPos);
                        
                        if (cameraMode !== 'event') {
                            cameraMode = 'event';
                            forceCameraCut = true;
                        }
                    }
                } else {
                    cameraTimer += realDelta;
                    if (cameraTimer > 4.0) { 
                        cameraTimer = 0; 
                        cameraMode = ['overview', 'side', 'front', 'follow'][Math.floor(Math.random()*4)]; 
                        forceCameraCut = true;
                    }
                    
                    if(isNaN(window._smoothLeaderPos)) window._smoothLeaderPos = 0;
                    window._smoothLeaderPos += (currentPackLeaderPos - window._smoothLeaderPos) * 0.05;

                    let cProg = (window._smoothLeaderPos % trackLength) / trackLength; 
                    if(isNaN(cProg)) cProg = 0;
                    if(cProg<0) cProg+=1;
                    cProg = Math.max(0, Math.min(1, cProg));
                    
                    const cp = trackCurve.getPointAt(cProg);
                    const ct = trackCurve.getTangentAt(cProg);
                    
                    if(cp && ct) {
                        const cn = new THREE.Vector3(ct.z, 0, -ct.x).normalize();

                        switch(cameraMode) {
                            case 'overview': tPos.copy(cp).sub(ct.clone().multiplyScalar(70 * zoomFactor)).add(new THREE.Vector3(0, 50 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(10)); break;
                            case 'side': tPos.copy(cp).add(cn.clone().multiplyScalar(60 * zoomFactor)).add(new THREE.Vector3(0, 25 * zoomFactor, 0)); lPos.copy(cp); break;
                            case 'front': tPos.copy(cp).add(ct.clone().multiplyScalar(60 * zoomFactor)).add(new THREE.Vector3(0, 20 * zoomFactor, 0)); lPos.copy(cp); break;
                            case 'follow': tPos.copy(cp).sub(ct.clone().multiplyScalar(35 * zoomFactor)).add(new THREE.Vector3(0, 15 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(15)); break;
                            default: tPos.copy(cp).sub(ct.clone().multiplyScalar(70 * zoomFactor)).add(new THREE.Vector3(0, 50 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(10)); break;
                        }
                    }
                }

                if (forceCameraCut) {
                    camera.position.copy(tPos);
                    window._camTargetPos.copy(tPos);
                    window._camLookAtPos.copy(lPos);
                    camera.lookAt(lPos);
                } else {
                    window._camTargetPos.lerp(tPos, 0.05);
                    window._camLookAtPos.lerp(lPos, 0.08);
                    camera.position.copy(window._camTargetPos);
                    camera.lookAt(window._camLookAtPos);
                }

                if(window._sun && runners.length > 0) {
                    let cProg = (window._smoothLeaderPos % trackLength) / trackLength; 
                    if(isNaN(cProg)) cProg=0;
                    if(cProg<0) cProg+=1;
                    cProg = Math.max(0, Math.min(1, cProg));
                    const cp = trackCurve.getPointAt(cProg);
                    if(cp) {
                        window._sun.position.copy(cp).add(new THREE.Vector3(100, 200, 50));
                        window._sun.target.position.copy(cp);
                        window._sun.target.updateMatrixWorld();
                    }
                }

                updateLeaderboard();
                drawMinimap();
                checkEndCondition();
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animateLoop);
        }

        function getSorted() {
            return [...runners].sort((a,b) => {
                if(a.retired && b.retired) return b.position - a.position;
                if(a.retired) return 1; if(b.retired) return -1;
                if(a.finished && b.finished) return a.finishTimeRaw - b.finishTimeRaw;
                if(a.finished) return -1; if(b.finished) return 1;
                return b.position - a.position;
            });
        }

        function updateLeaderboard() {
            const sorted = getSorted();
            ui.lbList.innerHTML = '';
            
            sorted.forEach((r, i) => {
                const rank = i + 1;
                const isQ = !r.retired && rank <= passCount;
                const div = document.createElement('div');
                div.className = `telemetry-row ${r.retired ? 'retired' : (isQ && r.finished ? 'qualified' : '')}`;
                
                let statText = '';
                let statClass = '';
                if(r.retired) { statText = 'DNF'; statClass = 'out'; }
                else if(r.finished) { statText = '🏁'; statClass = 'finish text-xl'; }

                div.innerHTML = `
                    <div class="tel-rank ea-font">${r.retired ? 'X' : rank}</div>
                    <div class="tel-color" style="background-color:${r.member.color}"></div>
                    <div class="tel-name ea-font" style="color:${r.retired?'#9ca3af':'white'}">${r.member.name}</div>
                    <div class="tel-time">${r.finishTimeStr || formatTime(raceTimer)}</div>
                    <div class="tel-status ea-font ${statClass}">${statText}</div>
                `;
                ui.lbList.appendChild(div);
            });
        }

        function checkEndCondition() {
            if (isTransitioningToResult) return;
            
            const aliveRunners = runners.filter(r => !r.retired);
            const finishedRunners = runners.filter(r => r.finished);
            
            if ((aliveRunners.length > 0 && finishedRunners.length === aliveRunners.length) || aliveRunners.length === 0) {
                isTransitioningToResult = true; 
                setFastForward(false); 
                stopEngineSound(); 
                stopBGM();
                
                setTimeout(() => {
                    raceEnded = true; 
                    showResultScreen();
                }, 1000); 
            }
        }

        function showResultScreen() {
            document.body.style.overflow = 'auto'; // 스크롤 허용
            ui.game.classList.add('hidden');
            ui.result.classList.remove('hidden');
            ui.raceTimerDisplay.style.opacity = '0';
            
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            
            const sorted = getSorted();
            lastRacePassedIds.clear(); lastRaceFailedIds.clear();
            
            // 1~6위, 7~12위 2열 분리 배치를 위해 그리드 CSS 직접 적용
            list.className = "grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3";
            list.style.gridAutoFlow = "column";
            list.style.gridTemplateRows = `repeat(${Math.ceil(sorted.length / 2)}, auto)`;
            
            sorted.forEach((r, i) => {
                const rank = i + 1;
                const isQ = !r.retired && rank <= passCount;
                if(isQ) lastRacePassedIds.add(r.member.id); else lastRaceFailedIds.add(r.member.id);

                const div = document.createElement('div');
                div.className = `flex items-center gap-4 p-3 bg-[rgba(255,255,255,0.03)] border border-[rgba(255,255,255,0.05)] ${isQ ? 'border-l-4 border-l-[var(--theme-mint)] bg-[rgba(172,254,248,0.1)]' : ''} ${r.retired ? 'opacity-50 grayscale' : ''}`;
                
                div.innerHTML = `
                    <div class="w-12 text-center text-2xl ea-font-black text-white">${r.retired ? 'DNF' : rank}</div>
                    <div class="w-12 h-12 bg-gray-800 overflow-hidden border-2 flex-shrink-0" style="border-color:${r.member.color}; border-radius: 50% !important;">
                        <img src="${r.member.imgWebp}" crossorigin="anonymous" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xl ea-font-black uppercase truncate" style="color: ${isQ ? 'white' : '#9ca3af'}">${r.member.name}</div>
                        <div class="text-md ea-font text-gray-400">${r.finishTimeStr || 'DNF'}</div>
                    </div>
                    <div class="w-24 text-right text-xl ea-font-black ${isQ ? 'text-[#acfef8]' : 'text-red-500'}">
                        ${isQ ? '합격' : (r.retired ? '리타이어' : '탈락')}
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('captureBtn').querySelector('span').textContent = '결과 복사';
        }

        function captureResults() {
            const span = document.getElementById('captureBtn').querySelector('span');
            span.textContent = '저장 중...';
            
            const listArea = document.getElementById('captureTarget');
            const originalScrollTop = listArea.scrollTop;
            listArea.classList.remove('overflow-y-auto', 'flex-1');
            listArea.style.maxHeight = 'none';
            
            const captureWrapper = document.getElementById('fullCaptureArea'); 
            
            domtoimage.toBlob(captureWrapper, { bgcolor: '#0a0a0f', style: { transform: 'scale(1)' } })
                .then(blob => {
                    listArea.classList.add('overflow-y-auto', 'flex-1');
                    listArea.style.maxHeight = '';
                    listArea.scrollTop = originalScrollTop;
                    
                    if (navigator.clipboard && navigator.clipboard.write) {
                        navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
                            .then(() => span.textContent = '클립보드 저장 완료!')
                            .catch(() => fallbackDownload(blob, span));
                    } else {
                        fallbackDownload(blob, span);
                    }
                })
                .catch(err => {
                    listArea.classList.add('overflow-y-auto', 'flex-1');
                    listArea.style.maxHeight = '';
                    span.textContent = '캡처 실패';
                });
        }
        
        function fallbackDownload(blob, span) {
            const a = document.createElement('a'); 
            a.download = 'R1_Result.png';
            a.href = URL.createObjectURL(blob); 
            a.click();
            span.textContent = '다운로드 됨!';
        }

        function returnToMenu() {
            document.body.style.overflow = 'hidden'; 
            ui.result.classList.add('hidden');
            ui.menu.classList.remove('hidden');
            passCount = null; selectedMembers.clear(); updateSelectionUI();
            
            if(lastRacePassedIds.size > 0 || lastRaceFailedIds.size > 0) {
                document.getElementById('selectPassedBtn').classList.remove('hidden');
                document.getElementById('selectFailedBtn').classList.remove('hidden');
            }
        }

        init();

    </script>
</body>
