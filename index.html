        function buildDrivers() {
            const arr = Array.from(selectedMembers).map(id => members.find(m => m.id === id));
            // Shuffle
            for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
            
            const spread = 0.05 / selectedLaps; 

            // F1 Style Zig-Zag Starting Grid
            arr.forEach((m, idx) => {
                const gridPosition = idx + 1; // 1, 2, 3...
                const isLeft = (gridPosition % 2 !== 0); // 1, 3, 5 are Left
                const laneWidth = 10.0; 
                
                const laneOffset = isLeft ? -laneWidth / 2 : laneWidth / 2;
                const zOffset = gridPosition * 14; 
                
                const group = new THREE.Group();
                const kart = new THREE.Group();
                group.add(kart);

                const cColor = new THREE.Color(m.color);
                
                const bMat = new THREE.MeshLambertMaterial({ color: cColor });
                const dMat = new THREE.MeshLambertMaterial({ color: 0x15151e }); 

                const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3.2), bMat); body.position.y = 0.5; body.castShadow = true; kart.add(body);
                const nose = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1.4), bMat); nose.position.set(0, 0.4, 2.3); nose.castShadow = true; kart.add(nose);
                const fWing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.5), dMat); fWing.position.set(0, 0.3, 2.8); fWing.castShadow = true; kart.add(fWing);
                
                const rWing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.7), dMat); rWing.position.set(0, 1.2, -1.4); rWing.castShadow = true; kart.add(rWing);
                
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.2), dMat); pillar.position.set(0, 0.8, -1.4); kart.add(pillar);

                const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.3, 16);
                const wheels = [];
                [[-0.9, 0.45, 1.8], [0.9, 0.45, 1.8], [-0.9, 0.45, -1.2], [0.9, 0.45, -1.2]].forEach(pos => {
                    const w = new THREE.Mesh(wGeo, dMat);
                    w.rotation.z = Math.PI/2; w.position.set(...pos); w.castShadow = true;
                    kart.add(w); wheels.push(w);
                });

                const tex = preloadedTextures[m.id];
                // 멤버 이미지가 빛에 의해 하얗게 뜨는 것을 방지하기 위해 MeshBasicMaterial 사용
                const fMat = new THREE.MeshBasicMaterial({ map: tex, color: 0xffffff });
                const headMatArray = [fMat, fMat, bMat, dMat, fMat, fMat];
                const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), headMatArray);
                head.position.set(0, 1.3, -0.2); head.castShadow = true; kart.add(head);

                const cvs = document.createElement('canvas'); cvs.width = 512; cvs.height = 128;
                const cx = cvs.getContext('2d');
                cx.fillStyle = 'rgba(10,10,15,0.8)'; cx.fillRect(0,0,512,128);
                cx.fillStyle = m.color; cx.fillRect(0,0,16,128);
                cx.fillStyle = '#fff'; cx.font = `italic 900 80px 'Noto Sans KR', sans-serif`;
                cx.textAlign = 'center'; cx.textBaseline = 'middle'; cx.fillText(m.name, 256, 68);
                
                const nameTag = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 0.75), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cvs), transparent: true, depthTest: false }));
                nameTag.position.set(0, 2.5, 0); 
                group.add(nameTag);
                
                group.scale.setScalar(2.2);
                scene.add(group);

                const baseSpd = 180 * (1.0 - spread/2 + Math.random() * spread); 
                
                runners.push({
                    member: m, mesh: group, kart, nameTag, rWing, wheels, laneOffset, originalLaneOffset: laneOffset, targetLane: laneOffset,
                    position: -zOffset, speed: baseSpd, baseSpeed: baseSpd, catchUpSpeed: 0,
                    targetSpdMult: 1.0, currentSpdMult: 1.0, multTimer: 0, overtakeCooldown: 0,
                    finished: false, retired: false, retired_fully: false, finishTimeStr: null, finishTimeRaw: null, maxBoostTimer: 0,
                    lap: 1, targetDist: trackLength * selectedLaps, currentRank: 1,
                    state: 'normal', stateTimer: 0, crashDirection: 1, spinAngle: 0, towedProgress: 0, particles: []
                });
                
                updateRunnerTransform(runners[runners.length-1]);
            });
        }

        function updateRunnerTransform(r) {
            if (isNaN(r.position)) r.position = 0;
            let prog = (r.position % trackLength) / trackLength;
            if (isNaN(prog)) prog = 0;
            if (prog < 0) prog += 1;
            prog = Math.max(0, Math.min(1, prog)); 

            const p = trackCurve.getPointAt(prog);
            const t = trackCurve.getTangentAt(prog);
            if (!p || !t) return; 
            const n = new THREE.Vector3(t.z, 0, -t.x).normalize();
            
            p.add(n.multiplyScalar(r.laneOffset || 0));
            r.mesh.position.set(p.x, (r.state !== 'crashed_wall' && r.state !== 'towed') ? 0.1 : r.mesh.position.y, p.z);
            
            r.mesh.lookAt(p.clone().add(t));
            r.nameTag.lookAt(camera.position);
        }

        function initMinimap() {
            ui.minimapCanvas.width = mmSize; ui.minimapCanvas.height = mmSize;
            mmCtx = ui.minimapCanvas.getContext('2d');
            
            let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
            const pts = trackCurve.getSpacedPoints(100);
            pts.forEach(p => {
                if(p.x < minX) minX=p.x; if(p.x > maxX) maxX=p.x;
                if(p.z < minZ) minZ=p.z; if(p.z > maxZ) maxZ=p.z;
            });
            trackBounds.minX = minX; trackBounds.maxX = maxX;
            trackBounds.minZ = minZ; trackBounds.maxZ = maxZ;
            
            const w = maxX - minX; const h = maxZ - minZ;
            const pad = 20;
            trackBounds.scale = Math.min((mmSize - pad*2)/w, (mmSize - pad*2)/h);
            trackBounds.cx = (minX + maxX)/2;
            trackBounds.cz = (minZ + maxZ)/2;
        }

        function drawMinimap() {
            if (!mmCtx) return;
            mmCtx.clearRect(0, 0, mmSize, mmSize);
            
            const cx = mmSize/2; const cy = mmSize/2; const scale = trackBounds.scale;
            
            mmCtx.beginPath();
            const pts = trackCurve.getSpacedPoints(100);
            pts.forEach((p, i) => {
                const px = cx + (p.x - trackBounds.cx) * scale;
                const py = cy + (p.z - trackBounds.cz) * scale;
                if(i===0) mmCtx.moveTo(px, py); else mmCtx.lineTo(px, py);
            });
            mmCtx.closePath();
            mmCtx.strokeStyle = '#555'; mmCtx.lineWidth = 10; mmCtx.stroke();
            mmCtx.strokeStyle = '#fff'; mmCtx.lineWidth = 2; mmCtx.stroke();

            const p0 = trackCurve.getPointAt(0);
            const px0 = cx + (p0.x - trackBounds.cx) * scale;
            const py0 = cy + (p0.z - trackBounds.cz) * scale;
            mmCtx.fillStyle = '#acfef8'; mmCtx.fillRect(px0-3, py0-3, 6, 6);

            const sorted = getSorted();
            [...sorted].reverse().forEach(r => {
                if(r.retired_fully) return; 
                let prog = (r.position % trackLength) / trackLength;
                if (isNaN(prog)) prog = 0;
                if (prog < 0) prog += 1;
                prog = Math.max(0, Math.min(1, prog));
                
                const p = trackCurve.getPointAt(prog);
                if (!p) return;
                const px = cx + (p.x - trackBounds.cx) * scale;
                const py = cy + (p.z - trackBounds.cz) * scale;
                
                mmCtx.beginPath(); mmCtx.arc(px, py, 4, 0, Math.PI*2);
                mmCtx.fillStyle = r.retired ? '#555' : r.member.color;
                mmCtx.fill();
                mmCtx.lineWidth = 1; mmCtx.strokeStyle = '#000'; mmCtx.stroke();
            });
        }

        function showCenterAlert(text, color = '#fff', duration = 2000) {
            ui.centerText.textContent = text;
            ui.centerText.style.color = color;
            ui.centerAlert.classList.remove('hidden');
            setTimeout(() => { ui.centerAlert.classList.add('hidden'); }, duration);
        }

        function showToast(tag, msg, type = 'red') {
            const div = document.createElement('div');
            div.className = `ea-toast toast-${type}`;
            div.innerHTML = `
                <div class="ea-toast-inner">
                    <div class="ea-toast-tag ea-font-black">${tag}</div>
                    <div class="ea-toast-msg ea-font">${msg}</div>
                </div>
            `;
            ui.toastContainer.appendChild(div);
            setTimeout(() => {
                div.style.opacity = 0; div.style.transform = 'skewX(-15deg) translateY(20px)';
                setTimeout(() => div.remove(), 400);
            }, 3500);
        }

        function setEventFocus(targets, duration) {
            activeEventTargets = targets.filter(r => r && !r.finished);
            if(activeEventTargets.length > 0) {
                eventFocusTimer = duration;
                cameraMode = 'event';
            }
        }

        function runStartAnimation() {
            lightState = 0;
            startingSequence = true;
            
            ui.lbContainer.style.opacity = '0';
            if(ui.gridIntroOverlay) ui.gridIntroOverlay.classList.add('hidden');

            if (!isMuted) {
                if(bgm) bgm.volume = bgmVolume * masterVolume * 0.2; // 그리드 소개 중 BGM 볼륨 감소
                gridAudioObj = new Audio('startinggrid.mp3');
                gridAudioObj.volume = Math.min(1.0, bgmVolume * masterVolume * 1.2); 
                gridAudioObj.play().catch(()=>{});
            }

            const p0 = trackCurve.getPointAt(0);
            const t0 = trackCurve.getTangentAt(0);
            const rightDir = new THREE.Vector3(t0.z, 0, -t0.x).normalize();

            // 전경 카메라 뷰: 골라인 앞쪽 대각선 위에서 전체 그리드를 조망
            window._panoStart = p0.clone().add(t0.clone().multiplyScalar(50)).add(rightDir.clone().multiplyScalar(30)).add(new THREE.Vector3(0, 25, 0));
            window._panoEnd = p0.clone().add(t0.clone().multiplyScalar(20)).add(rightDir.clone().multiplyScalar(10)).add(new THREE.Vector3(0, 15, 0));
            
            // 그리드 중간 지점을 바라봄
            const midDist = (runners.length / 2) * 14;
            window._panoTarget = p0.clone().sub(t0.clone().multiplyScalar(midDist));

            camera.position.copy(window._panoStart);
            camera.lookAt(window._panoTarget);

            cameraMode = 'intro_panorama';
            introTimer = 0; // 전경 진행 타이머
        }

        function emitParticles(r, colorHex, count) {
            for(let i=0; i<count; i++) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4), new THREE.MeshBasicMaterial({color: colorHex, transparent: true, opacity: 0.8}));
                m.position.set((Math.random()-0.5)*2, 0.5, -1.5);
                r.kart.add(m); r.particles.push({ m, life: Math.random(), isSmoke: colorHex === 0x333333 });
            }
        }

        function clearParticles(r) {
            r.particles.forEach(p => {
                r.kart.remove(p.m);
                if(p.m.geometry) p.m.geometry.dispose();
                if(p.m.material) p.m.material.dispose();
            });
            r.particles = [];
        }

        function updateParticles(r, gameDelta) {
            r.particles.forEach(p => {
                p.life += gameDelta * 1.5; if(p.life > 1) p.life = 0;
                if(p.isSmoke) {
                    p.m.position.z = -1.5 - p.life * 4; p.m.position.y = 0.5 + p.life * 3;
                    p.m.scale.setScalar(1 + p.life*2); p.m.material.opacity = 0.8 * (1 - p.life);
                } else {
                    p.m.position.z = -1.5 - p.life * 5; p.m.scale.setScalar(1 - p.life);
                }
            });
        }

        function setKartOpacity(kart, opacity) {
            kart.traverse(child => {
                if (child.isMesh) {
                    if (!child.material.isClonedForOpacity) {
                        if (Array.isArray(child.material)) {
                            child.material = child.material.map(m => {
                                const newMat = m.clone(); newMat.transparent = true; newMat.isClonedForOpacity = true; return newMat;
                            });
                        } else {
                            child.material = child.material.clone();
                            child.material.transparent = true;
                            child.material.isClonedForOpacity = true;
                        }
                    }
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.opacity = opacity);
                    } else {
                        child.material.opacity = opacity;
                    }
                }
            });
        }

        function animateLoop(time) {
            if (typeof time !== 'number') time = performance.now();
            if (!gameRunning) return;
            
            if (gamePaused) { lastTime = time; requestAnimationFrame(animateLoop); return; }

            let rawDelta = (time - lastTime) / 1000;
            if (isNaN(rawDelta) || rawDelta <= 0) rawDelta = 0.016; 
            
            const realDelta = Math.min(rawDelta, 0.1);
            lastTime = time;

            let currentTargetTimeScale = isPhotoFinish ? 0.2 : (isFastForwarding ? 4.0 : 1.0);
            
            if (bgm) bgm.playbackRate = isFastForwarding ? 1.5 : 1.0;

            window._actualTimeScale += (currentTargetTimeScale - window._actualTimeScale) * 0.1;
            const gameDelta = realDelta * window._actualTimeScale;

            if (window._forceCameraCut) {
                forceCameraCut = true;
                window._forceCameraCut = false;
            } else {
                forceCameraCut = false;
            }

            if (startingSequence) {
                if (cameraMode === 'intro_panorama') {
                    introTimer += realDelta;
                    const panoDuration = 3.5; // 음성 길이에 맞춘 전경 시간 (3.5초)
                    let prog = Math.min(introTimer / panoDuration, 1.0);
                    let easeProg = prog < 0.5 ? 2 * prog * prog : -1 + (4 - 2 * prog) * prog;
                    
                    camera.position.lerpVectors(window._panoStart, window._panoEnd, easeProg);
                    camera.lookAt(window._panoTarget);
                    
                    if (prog >= 1.0) {
                        cameraMode = 'intro_sequence';
                        introIdx = runners.length - 1; // 꼴찌부터 소개 시작
                        introTimer = 0; // 즉시 다음 시퀀스로
                    }
                } else if (cameraMode === 'intro_sequence') {
                    introTimer -= realDelta;
                    if (introTimer <= 0) {
                        if (introIdx < 0) {
                            cameraMode = 'intro_fly';
                            introTimer = 0;
                            ui.gridIntroOverlay.classList.add('hidden');
                            
                            const p0 = trackCurve.getPointAt(0);
                            const t0 = trackCurve.getTangentAt(0);
                            window._flyStart = camera.position.clone();
                            window._flyEnd = p0.clone().sub(t0.clone().multiplyScalar(25)).add(new THREE.Vector3(0, 3, 0));
                            window._flyTarget = p0.clone().add(new THREE.Vector3(0, 22, 0));
                        } else {
                            introTimer = 1.5; 
                            let r = runners[introIdx];
                            
                            ui.gridIntroOverlay.classList.remove('hidden');
                            document.getElementById('gridIntroPos').textContent = `GRID ${introIdx + 1}`;
                            document.getElementById('gridIntroName').textContent = r.member.name;
                            document.getElementById('gridIntroBox').style.borderLeftColor = r.member.color;
                            
                            let box = document.getElementById('gridIntroBox');
                            box.style.opacity = 0;
                            box.style.transform = 'skewX(-15deg) translateX(-50px)';
                            setTimeout(() => {
                                if (!gameRunning) return;
                                box.style.opacity = 1;
                                box.style.transform = 'skewX(-15deg) translateX(0)';
                                playSound('beep');
                            }, 50);

                            let prog = (r.position % trackLength) / trackLength;
                            if (prog < 0) prog += 1;
                            let ct = trackCurve.getTangentAt(prog);
                            let cn = new THREE.Vector3(ct.z, 0, -ct.x).normalize();
                            let cp = r.mesh.position.clone();
                            
                            let camSide = Math.sign(r.laneOffset);
                            if (camSide === 0) camSide = 1;
                            
                            // 카메라를 차량 앞 대각선에 배치하여 멤버의 얼굴과 차량이 잘 보이도록 수정
                            window._camTargetPos.copy(cp).add(ct.clone().multiplyScalar(15)).add(cn.clone().multiplyScalar(camSide * 7)).add(new THREE.Vector3(0, 3, 0));
                            window._camLookAtPos.copy(cp).add(new THREE.Vector3(0, 1.5, 0));
                            
                            camera.position.copy(window._camTargetPos);
                            camera.lookAt(window._camLookAtPos);
                            
                            introIdx--;
                        }
                    }
                    
                    if (introIdx >= -1) {
                        let targetIdx = introIdx + 1;
                        if (targetIdx >= runners.length) targetIdx = runners.length - 1; 
                        let r = runners[targetIdx];
                        let prog = (r.position % trackLength) / trackLength;
                        if (prog < 0) prog += 1;
                        let ct = trackCurve.getTangentAt(prog);
                        
                        // 카메라가 서서히 뒤로 빠지면서 멤버를 지속적으로 바라봄
                        camera.position.sub(ct.clone().multiplyScalar(realDelta * 2.5));
                        camera.lookAt(r.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
                    }
                    
                } else if (cameraMode === 'intro_fly') {
                    introTimer += realDelta;
                    let prog = Math.min(introTimer / 2.5, 1.0); // 2.5 seconds to fly
                    let easeProg = prog < 0.5 ? 2 * prog * prog : -1 + (4 - 2 * prog) * prog;
                    
                    camera.position.lerpVectors(window._flyStart, window._flyEnd, easeProg);
                    camera.lookAt(window._flyTarget);
                    
                    if (prog >= 1.0) {
                        cameraMode = 'intro_lights';
                        introTimer = 0;
                        lightState = 0;
                    }
                } else if (cameraMode === 'intro_lights') {
                    introTimer += realDelta;
                    
                    if (introTimer > 1.0 && lightState === 0) { lightState=1; window._startLights[0].material.color.setHex(0xff2222); playSound('beep'); }
                    if (introTimer > 2.0 && lightState === 1) { lightState=2; window._startLights[1].material.color.setHex(0xff2222); playSound('beep'); }
                    if (introTimer > 3.0 && lightState === 2) { lightState=3; window._startLights[2].material.color.setHex(0xff2222); playSound('beep'); }
                    if (introTimer > 4.0 && lightState === 3) { lightState=4; window._startLights[3].material.color.setHex(0xff2222); playSound('beep'); }
                    if (introTimer > 5.0 && lightState === 4) { lightState=5; window._startLights[4].material.color.setHex(0xff2222); playSound('beep'); }
                    
                    if (introTimer > 6.0) {
                        window._startLights.forEach(l => l.material.color.setHex(0x110000)); 
                        showCenterAlert('GO!', '#22c55e', 1500);
                        playSound('beep_high');
                        
                        if (!isMuted) {
                            if(bgm) bgm.volume = isMuted ? 0 : bgmVolume * masterVolume; // BGM 볼륨 원복
                            const gasokSnd = new Audio('gasok.mp3');
                            gasokSnd.volume = Math.min(1.0, sfxVolume * masterVolume * 0.9); 
                            gasokSnd.play().catch(e => console.log('gasok.mp3 play failed:', e));
                        }

                        startEngineSound();
                        
                        raceStarted = true; 
                        startingSequence = false;
                        ui.lbContainer.style.opacity = '1';
                        lastTime = performance.now();
                        
                        window._smoothLeaderPos = 0;
                        cameraMode = 'follow'; 
                    }
                }
            } else if (raceStarted && !raceEnded) {
                gameTime += gameDelta;
                raceTimer += realDelta; 

                let maxPos = 0;
                let leaderSpeed = 0;

                let validRunners = runners.filter(r => !r.retired);
                let finishedRunners = runners.filter(r => r.finished);
                let totalRacing = validRunners.length;

                let activeRacing = runners.filter(r => !r.retired && !r.finished).sort((a,b) => b.position - a.position);
                activeRacing.forEach((runner, idx) => { runner.currentRank = finishedRunners.length + idx + 1; });

                let absoluteLeader = activeRacing[0]; 
                
                let currentLeaderLap = absoluteLeader ? Math.min(selectedLaps, Math.floor(Math.max(0, absoluteLeader.position) / trackLength) + 1) : 1;
                let currentLapProgress = absoluteLeader ? (Math.max(0, absoluteLeader.position) % trackLength) / trackLength : 0;

                // 코너 충돌 리타이어 (인원 방어 로직 추가)
                if (currentLeaderLap === selectedLaps && currentLapProgress > 0.5 && activeRacing.length >= 2 && Math.random() < 0.01 * gameDelta) {
                    let totalStarters = runners.length;
                    let allowedRetirements = totalStarters - passCount; // 전체 기준 탈락 허용 수
                    let currentRetirements = runners.filter(r => r.retired).length;

                    // 탈락 여유 인원이 최소 2명 이상 남아있을 때만 다중 리타이어 이벤트 발동
                    if (currentRetirements + 2 <= allowedRetirements) {
                        let crashIdx = Math.floor(Math.random() * (activeRacing.length - 1));
                        let c1 = activeRacing[crashIdx];
                        let c2 = activeRacing[crashIdx + 1];

                        if (c1.state === 'normal' && c2.state === 'normal' && Math.abs(c1.position - c2.position) < 20) {
                            let prog = (c1.position % trackLength) / trackLength;
                            let t1 = trackCurve.getTangentAt(prog);
                            let t2 = trackCurve.getTangentAt(Math.min(1, prog + 0.01));
                            
                            if (t1.angleTo(t2) > 0.07) {
                                // 같은 벽(외곽 또는 내곽)에 부딪히도록 통일
                                let crashDir = Math.random() < 0.5 ? 1 : -1;
                                c1.retired = true; c1.state = 'crashing'; c1.crashDirection = crashDir; c1.finishTimeStr='DNF'; c1.finishTimeRaw = Infinity;
                                c2.retired = true; c2.state = 'crashing'; c2.crashDirection = crashDir; c2.finishTimeStr='DNF'; c2.finishTimeRaw = Infinity;
                                playBoxRadio(c1.member, '코너 경합 중 대형 충돌, 리타이어!', false);
                                playBoxRadio(c2.member, '차량 대파, 리타이어!', false);
                                setEventFocus([c1, c2], 2.0); // 비추는 시간 2.0초로 단축
                                playSound('crash'); 
                            }
                        }
                    }
                }

                if (vscActive) {
                    vscTimer -= gameDelta;
                    if (vscTimer <= 0) {
                        vscActive = false;
                        playBoxRadio({name: 'RACE CONTROL', color: '#22c55e'}, '트랙 클리어! 레이스 재개', false);
                    }
                }

                runners.forEach(r => {
                    if (r.retired_fully) return;

                    // 고무줄 효과 (Catch-up)
                    if (!r.finished && !r.retired && absoluteLeader && r !== absoluteLeader) {
                        let gap = Math.max(0, absoluteLeader.position - r.position);
                        let gapRatio = gap / trackLength;
                        
                        if (totalRacing >= 7) {
                            // 7명 이상: 팩이 분산되어 거리를 두도록 캐치업 대폭 감소
                            let catchUpBoost = gapRatio * 0.25 + (r.currentRank * 0.003);
                            r.catchUpSpeed = r.baseSpeed * catchUpBoost;
                        } else {
                            // 6명 이하: 적을수록 캐치업 강하게 (난전 유도)
                            let intensity = Math.max(1.0, 12 / totalRacing); 
                            let catchUpBoost = (gapRatio * (selectedLaps === 1 ? 1.0 : 0.6) * intensity) + (r.currentRank * 0.01 * intensity);
                            r.catchUpSpeed = r.baseSpeed * catchUpBoost;
                        }
                    } else {
                        r.catchUpSpeed = 0;
                    }

                    if (r.retired) {
                        if (r.state === 'crashing') {
                            r.laneOffset += r.crashDirection * gameDelta * (trackWidth * 1.5); 
                            r.speed = Math.max(0, r.speed - gameDelta * (r.baseSpeed * 1.5)); 
                            r.position += r.speed * gameDelta;
                            r.spinAngle += gameDelta * 20; 
                            const maxOffset = trackWidth / 2 - 1.0; 
                            if (Math.abs(r.laneOffset) >= maxOffset) {
                                r.laneOffset = Math.sign(r.laneOffset) * maxOffset;
                                r.speed = 0; r.state = 'crashed_wall';
                                emitParticles(r, 0xffaa00, 40); emitParticles(r, 0x333333, 50); 
                            }
                            updateRunnerTransform(r);
                        } else if (r.state === 'crashed_wall') {
                            r.towedProgress += gameDelta * 0.4;
                            setKartOpacity(r.kart, 1 - r.towedProgress);
                            r.nameTag.material.opacity = 1 - r.towedProgress;
                            if (r.towedProgress >= 1) { r.retired_fully = true; r.mesh.visible = false; }
                            updateRunnerTransform(r);
                        } else {
                            r.speed = Math.max(0, r.speed - gameDelta * (r.baseSpeed * 0.8));
                            r.position += r.speed * gameDelta;
                            updateRunnerTransform(r);
                        }
                    } else if (!r.finished) {
                        if (r.state === 'max_boost') {
                            r.maxBoostTimer -= gameDelta;
                            r.targetSpdMult = 2.0; 
                            r.catchUpSpeed = r.baseSpeed * 0.8; 
                            
                            if (Math.random() < 0.4) emitParticles(r, 0xffaa00, 3);
                            
                            // 상위권(2등 이내) 도달 시 자연스럽게 감속되도록 완화
                            if (r.currentRank <= 2) {
                                r.targetSpdMult = 1.2;
                                r.catchUpSpeed = 0;
                            }
                            
                            if (r.maxBoostTimer <= 0) {
                                r.state = 'normal';
                                r.targetSpdMult = 1.0;
                            }
                        } else if (r.state === 'sc_slowing') {
                            r.stateTimer -= gameDelta;
                            r.targetSpdMult = 0.4;
                            if (r.stateTimer <= 0) {
                                r.state = 'normal';
                                r.targetSpdMult = 1.0;
                            }
                        } else {
                            if (r.speed < r.baseSpeed) { r.speed = Math.min(r.baseSpeed, r.speed + gameDelta * 25); }

                            let intensity = Math.max(1.0, 12 / totalRacing);
                            let carAhead = null, minG = Infinity;
                            
                            // 인원수에 따라 반응 거리 조정
                            let reactDist;
                            if (totalRacing >= 7) {
                                reactDist = Math.max(20, r.baseSpeed * 0.3); // 7명 이상: 거리 넓게 일렬 유지
                            } else {
                                reactDist = Math.max(12, r.baseSpeed * (0.5 / Math.sqrt(intensity))); // 6명 이하: 다닥다닥
                            }
                            
                            // 골라인 접근 시 회피 반경을 넓혀 겹침 방지
                            if (r.lap === selectedLaps && (r.targetDist - r.position) < 250) {
                                reactDist = Math.max(40, reactDist * 1.5);
                            }

                            for (let o of validRunners) {
                                if (o !== r && o.position > r.position && o.position - r.position < reactDist) {
                                    if (o.position - r.position < minG) { minG = o.position - r.position; carAhead = o; }
                                }
                            }
                            
                            r.targetLane = r.originalLaneOffset;
                            if (r.state === 'overtake') {
                                // 추월 시 결정된 방향으로 확실하게 차선 변경
                                r.targetLane = r.originalLaneOffset + (r.overtakeDirection || 8);
                            } else if (carAhead && Math.abs(r.laneOffset - carAhead.laneOffset) < 5) { 
                                // 모두가 회피(추월)를 시도하되, 7명 이상일 때는 좀 더 부드럽게 브레이크를 섞어 거리를 둠
                                r.targetLane = carAhead.laneOffset + (r.laneOffset >= carAhead.laneOffset ? 8 : -8); 
                                
                                if (totalRacing >= 7) {
                                    if (r.speed > carAhead.speed) {
                                        r.speed = Math.max(carAhead.speed, r.speed - gameDelta * 25);
                                    }
                                } else {
                                    if (r.speed > carAhead.speed + 5) r.speed = Math.max(carAhead.speed + 5, r.speed - gameDelta * 20 * intensity); 
                                }
                            }
                            
                            if (Math.abs(r.laneOffset - r.targetLane) > 0.1) {
                                r.laneOffset += Math.sign(r.targetLane - r.laneOffset) * gameDelta * 10;
                            }
                            
                            const maxOffset = trackWidth / 2 - 3.0;
                            if (Math.abs(r.laneOffset) > maxOffset) {
                                r.laneOffset = Math.sign(r.laneOffset) * maxOffset;
                            }

                            if (vscActive) {
                                if (r.currentRank === 1) {
                                    r.targetSpdMult = 0.3;
                                } else {
                                    let prevR = activeRacing[r.currentRank - 2];
                                    if (prevR && prevR.position - r.position < 20) r.targetSpdMult = 0.3;
                                    else r.targetSpdMult = 0.8;
                                }
                            } else {
                                let overtakeProb;
                                if (totalRacing >= 7) {
                                    // 7명 이상일 때는 추월 시도를 순위에 기반하여 조절
                                    let rankRatio = (r.currentRank - 1) / (totalRacing - 1);
                                    overtakeProb = 0.08 + rankRatio * 0.2; 
                                } else {
                                    overtakeProb = 0.02 * intensity;
                                    if (totalRacing > 1 && r.currentRank) {
                                        let rankRatio = (r.currentRank - 1) / (totalRacing - 1);
                                        overtakeProb = (0.005 + rankRatio * 0.045) * intensity; 
                                    } else if (totalRacing === 1) {
                                        overtakeProb = 0.005;
                                    }
                                }
    
                                // 7명 이상일 때도 carAhead 여부 상관없이 가끔 overtake 모드 진입하게 허용
                                if (r.state === 'normal' && Math.random() < overtakeProb * gameDelta) {
                                    r.state = 'overtake';
                                    r.stateTimer = 1.5; // 추월 지속 시간
                                    // 추월 방향 결정 (중앙에 있으면 바깥으로, 아니면 내 위치 기준 바깥으로)
                                    r.overtakeDirection = (Math.abs(r.laneOffset) < 2.0) ? (Math.random() < 0.5 ? 9 : -9) : (r.laneOffset > 0 ? 9 : -9);
                                    emitParticles(r, 0xacfef8, 10);
                                }
    
                                if (r.state === 'puncture') {
                                    r.stateTimer -= gameDelta;
                                    if (r.stateTimer <= 0) { 
                                        r.state = 'normal'; r.targetSpdMult = 1.0; clearParticles(r); 
                                    }
                                } else if (r.state === 'overtake') {
                                    r.stateTimer -= gameDelta; r.targetSpdMult = 1.5;
                                    if (Math.random() < 0.2) emitParticles(r, 0xacfef8, 2);
                                    if (r.stateTimer <= 0) { r.state = 'normal'; r.targetSpdMult = 1.0; clearParticles(r); }
                                } else {
                                    r.multTimer -= gameDelta;
                                    if(r.multTimer <= 0) {
                                        r.multTimer = 0.5 + Math.random() * 2.0; 
                                        r.targetSpdMult = 0.85 + Math.random() * 0.35; 
                                    }
                                }
                            }
                        }
                        
                        r.currentSpdMult += (r.targetSpdMult - r.currentSpdMult) * gameDelta * 3.0; 
                        const actualSpeed = r.speed * r.currentSpdMult + r.catchUpSpeed;
                        r.position += actualSpeed * gameDelta;
                        
                        maxPos = Math.max(maxPos, r.position);
                        if(r.position === maxPos) leaderSpeed = r.speed * r.currentSpdMult;

                        r.lap = Math.floor(Math.max(0, r.position) / trackLength) + 1;

                        if (r.position >= r.targetDist) {
                            r.finished = true; 
                            r.finishTimeRaw = raceTimer; r.finishTimeStr = formatTime(raceTimer); 
                            r.state = 'normal';
                        }
                        updateRunnerTransform(r);
                    } else {
                        // 통과 후에도 앞차를 인지하고 피하도록 회피 로직 강화
                        let carAhead = null, minG = Infinity;
                        for (let o of validRunners) {
                            if (o !== r && o.position > r.position && o.position - r.position < 50) {
                                if (o.position - r.position < minG) { minG = o.position - r.position; carAhead = o; }
                            }
                        }
                        
                        r.targetLane = r.originalLaneOffset;
                        if (carAhead && Math.abs(r.laneOffset - carAhead.laneOffset) < 5) { 
                            r.targetLane = carAhead.laneOffset + (r.laneOffset >= carAhead.laneOffset ? 8 : -8); 
                            // 앞차와 부딪히지 않게 즉각 감속
                            if (r.speed > carAhead.speed) r.speed = Math.max(carAhead.speed, r.speed - gameDelta * 40); 
                        }
                        
                        if (Math.abs(r.laneOffset - r.targetLane) > 0.1) {
                            r.laneOffset += Math.sign(r.targetLane - r.laneOffset) * gameDelta * 10;
                        }
                        
                        const maxOffset = trackWidth / 2 - 3.0;
                        if (Math.abs(r.laneOffset) > maxOffset) {
                            r.laneOffset = Math.sign(r.laneOffset) * maxOffset;
                        }

                        r.position += r.speed * gameDelta;
                        r.speed = Math.max(0, r.speed - gameDelta * 5); // 자연 감속 유지
                        updateRunnerTransform(r);
                    }
                    
                    if(!r.retired_fully) {
                        r.wheels.forEach(w => w.rotation.x -= (r.speed * r.currentSpdMult || r.speed) * gameDelta * 0.15);
                        updateParticles(r, gameDelta);
                    }
                });
                
                updateEngineSound(leaderSpeed);

                const leaderLap = Math.min(selectedLaps, Math.floor(Math.max(0, maxPos) / trackLength) + 1);
                let lapProgress = (maxPos % trackLength) / trackLength;

                if (leaderLap === selectedLaps && lapProgress > 0.05 && !lastLapEventTriggered) {
                    lastLapEventTriggered = true;
                    let dice = Math.random();
                    
                    if (selectedLaps > 1 && dice < 0.05 && activeRacing.length > 2) {
                        playBoxRadio({name: 'RACE CONTROL', color: '#facc15'}, '세이프티 카 발동, 전원 감속', false);
                        for(let i=0; i<activeRacing.length - 1; i++) {
                            let t = activeRacing[i];
                            t.state = 'sc_slowing'; t.stateTimer = 5.0;
                        }
                        setEventFocus(activeRacing.slice(0, 2), 5.0);
                    }
                    else if (selectedLaps > 1 && dice < 0.1) {
                        playBoxRadio({name: 'RACE CONTROL', color: '#facc15'}, '버추얼 세이프티 카 발동', false);
                        vscActive = true; vscTimer = 10.0;
                    }
                }
                
                // MAX 이벤트 (확률 33%)
                if (leaderLap === selectedLaps && lapProgress > 0.80 && !maxEventTriggered) {
                    maxEventTriggered = true;
                    if (activeRacing.length >= 2 && Math.random() < 0.33) {
                        const lastPlace = activeRacing[activeRacing.length - 1];
                        lastPlace.state = 'max_boost';
                        lastPlace.maxBoostTimer = 12.0; 
                        
                        if (!isMuted) {
                            const maxSnd = new Audio('max.mp3');
                            maxSnd.volume = Math.min(1.0, sfxVolume * masterVolume * 0.6); 
                            maxSnd.play().catch(()=>{});
                        }
                        
                        playBoxRadio(lastPlace.member, 'MAX VERSTAPPEN MODE!', false);
                        showCenterAlert('MAX BOOST!', lastPlace.member.color, 2500);
                        setEventFocus([lastPlace], 6.0); 
                    }
                }

                if (!lapPunctureTriggered[leaderLap] && lapProgress > lapPunctureTriggerPos[leaderLap]) {
                    lapPunctureTriggered[leaderLap] = true;
                    const candidates = runners.filter(r => !r.finished && !r.retired && r.state === 'normal' && r.currentRank <= Math.ceil(totalRacing / 2));
                    if (candidates.length > 0) {
                        const r = candidates[Math.floor(Math.random() * candidates.length)];
                        r.state = 'puncture'; r.stateTimer = 2.0; 
                        r.currentSpdMult = 0.45; r.targetSpdMult = 0.45; 
                        playBoxRadio(r.member, '타이어 펑처', true);
                        emitParticles(r, 0xdddddd, 20); 
                        setEventFocus([r], 3.0);
                    }
                }

                ui.lapInfo.textContent = `LAP ${leaderLap}/${selectedLaps}`;

                if (absoluteLeader && absoluteLeader.lap === selectedLaps && (absoluteLeader.targetDist - absoluteLeader.position) < 120 && !isPhotoFinish) {
                    isPhotoFinish = true;
                    setFastForward(false); 
                    cameraMode = 'photo_finish';
                    window._forceCameraCut = true;
                }

                if (isPhotoFinish) {
                    photoFinishTimer += realDelta; 
                    if (photoFinishTimer > 15.0 || finishedRunners.length >= totalRacing) { 
                        isPhotoFinish = false;
                        cameraMode = 'follow';
                    }
                } else if (!isPhotoFinish && cameraMode === 'photo_finish') {
                    cameraMode = 'follow';
                }

                if (isPhotoFinish) {
                    // 고정 카메라 유지
                } else {
                    if (eventFocusTimer > 0 && activeEventTargets.length > 0) {
                        eventFocusTimer -= realDelta; 
                        window._currentFocusTarget = activeEventTargets[0];
                        if (cameraMode !== 'event') { cameraMode = 'event'; forceCameraCut = true; }
                    } else {
                        cameraTimer += realDelta;
                        if (cameraTimer > 4.0) { 
                            cameraTimer = 0; 
                            cameraMode = ['overview', 'side', 'front', 'follow'][Math.floor(Math.random()*4)]; 
                            forceCameraCut = true;
                            
                            if (activeRacing.length >= 3 && Math.random() < 0.4) {
                                let minGap = Infinity; let battleLeader = absoluteLeader;
                                for (let i = 1; i < activeRacing.length - 1; i++) { 
                                    let gap = activeRacing[i].position - activeRacing[i+1].position;
                                    if (gap < minGap) { minGap = gap; battleLeader = activeRacing[i]; }
                                }
                                if (minGap < 40) window._currentFocusTarget = battleLeader;
                                else window._currentFocusTarget = absoluteLeader;
                            } else {
                                window._currentFocusTarget = absoluteLeader;
                            }
                        }
                        if (!window._currentFocusTarget || window._currentFocusTarget.retired_fully || window._currentFocusTarget.finished) {
                            window._currentFocusTarget = absoluteLeader;
                        }
                    }
                }

                if (window._prevPackLeader !== window._currentFocusTarget) {
                    forceCameraCut = true; 
                    window._prevPackLeader = window._currentFocusTarget;
                }

                let currentPackLeaderPos = window._currentFocusTarget ? window._currentFocusTarget.position : 0;
                
                if(isNaN(window._smoothLeaderPos)) window._smoothLeaderPos = 0;
                window._smoothLeaderPos += (currentPackLeaderPos - window._smoothLeaderPos) * Math.min(1.0, realDelta * 6.0);

                let cProg = (window._smoothLeaderPos % trackLength) / trackLength; 
                if(isNaN(cProg)) cProg = 0; if(cProg<0) cProg+=1; cProg = Math.max(0, Math.min(1, cProg));
                
                const tPos = new THREE.Vector3();
                const lPos = new THREE.Vector3();
                const cp = trackCurve.getPointAt(cProg);
                const ct = trackCurve.getTangentAt(cProg);
                
                if(cp && ct) {
                    const cn = new THREE.Vector3(ct.z, 0, -ct.x).normalize();
                    
                    if (isPhotoFinish) {
                        const cpFin = trackCurve.getPointAt(0); 
                        const ctFin = trackCurve.getTangentAt(0); 
                        const cnFin = new THREE.Vector3(ctFin.z, 0, -ctFin.x).normalize();
                        
                        tPos.copy(cpFin).add(cnFin.clone().multiplyScalar(90)).add(new THREE.Vector3(0, 55, 0)); 
                        lPos.copy(cpFin); 
                    } else if (cameraMode === 'event') {
                        let cx=0, cy=0, cz=0; activeEventTargets.forEach(t => { cx+=t.mesh.position.x; cy+=t.mesh.position.y; cz+=t.mesh.position.z; });
                        cx/=activeEventTargets.length; cy/=activeEventTargets.length; cz/=activeEventTargets.length;
                        const midPos = new THREE.Vector3(cx,cy,cz);
                        
                        let camSide = 1;
                        let camDist = 35;
                        let camHeight = 25;
                        
                        if (window._currentFocusTarget) {
                            if (window._currentFocusTarget.state === 'crashing') {
                                camSide = -Math.sign(window._currentFocusTarget.crashDirection || 1); 
                            } else if (window._currentFocusTarget.state === 'max_boost') {
                                camSide = -Math.sign(window._currentFocusTarget.laneOffset || 1);
                                camDist = 60; 
                                camHeight = 40;
                            } else {
                                camSide = -Math.sign(window._currentFocusTarget.laneOffset || 1);
                            }
                        }
                        
                        tPos.copy(midPos).add(cn.multiplyScalar(camSide * camDist)).add(new THREE.Vector3(0, camHeight, 0)); 
                        lPos.copy(midPos);
                    } else {
                        switch(cameraMode) {
                            case 'overview': tPos.copy(cp).sub(ct.clone().multiplyScalar(70 * zoomFactor)).add(new THREE.Vector3(0, 50 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(10)); break;
                            case 'side': tPos.copy(cp).add(ct.clone().multiplyScalar(10)).add(cn.clone().multiplyScalar(60 * zoomFactor)).add(new THREE.Vector3(0, 25 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(10)); break;
                            case 'front': tPos.copy(cp).add(ct.clone().multiplyScalar(60 * zoomFactor)).add(new THREE.Vector3(0, 20 * zoomFactor, 0)); lPos.copy(cp); break;
                            case 'follow': tPos.copy(cp).sub(ct.clone().multiplyScalar(35 * zoomFactor)).add(new THREE.Vector3(0, 15 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(15)); break;
                            default: tPos.copy(cp).sub(ct.clone().multiplyScalar(70 * zoomFactor)).add(new THREE.Vector3(0, 50 * zoomFactor, 0)); lPos.copy(cp).add(ct.clone().multiplyScalar(10)); break;
                        }
                    }
                }

                if (forceCameraCut) {
                    camera.position.copy(tPos); 
                    camera.lookAt(lPos);
                } else {
                    camera.position.copy(tPos); 
                    camera.lookAt(lPos);
                }

                if(window._sun && runners.length > 0) {
                    let cProg = (window._smoothLeaderPos % trackLength) / trackLength; 
                    if(isNaN(cProg)) cProg=0; if(cProg<0) cProg+=1; cProg = Math.max(0, Math.min(1, cProg));
                    const cp = trackCurve.getPointAt(cProg);
                    if(cp) {
                        window._sun.position.copy(cp).add(new THREE.Vector3(100, 200, 50));
                        window._sun.target.position.copy(cp); window._sun.target.updateMatrixWorld();
                    }
                }

                updateLeaderboard();
                drawMinimap();
                checkEndCondition();
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animateLoop);
        }

        function getSorted() {
            return [...runners].sort((a,b) => {
                if(a.retired && b.retired) return b.position - a.position;
                if(a.retired) return 1; if(b.retired) return -1;
                if(a.finished && b.finished) return a.finishTimeRaw - b.finishTimeRaw;
                if(a.finished) return -1; if(b.finished) return 1;
                return b.position - a.position;
            });
        }

        function updateLeaderboard() {
            const sorted = getSorted();
            ui.lbList.innerHTML = '';
            
            sorted.forEach((r, i) => {
                const rank = i + 1;
                const isQ = !r.retired && rank <= passCount;
                const div = document.createElement('div');
                div.className = `telemetry-row ${r.retired ? 'retired' : (isQ && r.finished ? 'qualified' : '')}`;
                
                let statText = '';
                let statClass = '';
                if(r.retired) { statText = 'DNF'; statClass = 'out'; }
                else if(r.finished) { statText = '🏁'; statClass = 'finish text-xl'; }
                else if(r.state === 'max_boost') { statText = 'MAX'; statClass = 'text-[0.7rem] text-[#ff0000] font-bold'; }
                else if(r.state === 'overtake') {
                    statText = `<div style="display:inline-block; width:12px; height:12px; background-color:var(--theme-mint); animation: flashRadio 0.3s infinite alternate;"></div>`;
                }

                let displayTime = '';
                let displayInterval = '';

                if (!r.retired) {
                    if (r.finished) { displayTime = r.finishTimeStr; } 
                    else { displayTime = formatTime(raceTimer); }
                    
                    if (i > 0) {
                        const prevR = sorted[i-1];
                        if (!prevR.retired) {
                            if (r.finished && prevR.finished) {
                                const tGap = Math.max(0, r.finishTimeRaw - prevR.finishTimeRaw);
                                displayInterval = `+${tGap.toFixed(3)}`;
                            } else if (!r.finished) {
                                const distGap = Math.max(0, prevR.position - r.position);
                                const calcSpeed = Math.max(r.speed, r.baseSpeed * 0.5); 
                                const tGap = distGap / calcSpeed;
                                displayInterval = `+${tGap.toFixed(2)}`;
                            }
                        }
                    }
                }

                div.innerHTML = `
                    <div class="tel-rank ea-font">${r.retired ? 'X' : rank}</div>
                    <div class="tel-color" style="background-color:${r.member.color}"></div>
                    <div class="tel-name ea-font" style="color:${r.retired?'#9ca3af':'white'}">${r.member.name}</div>
                    <div class="tel-time">${displayTime}</div>
                    <div class="tel-interval">${displayInterval}</div>
                    <div class="tel-status ea-font ${statClass}">${statText}</div>
                `;
                ui.lbList.appendChild(div);
            });
        }

        function checkEndCondition() {
            if (isTransitioningToResult) return;
            const aliveRunners = runners.filter(r => !r.retired);
            const finishedRunners = runners.filter(r => r.finished);
            
            if ((aliveRunners.length > 0 && finishedRunners.length === aliveRunners.length) || aliveRunners.length === 0) {
                isTransitioningToResult = true; 
                setFastForward(false); stopEngineSound(); stopBGM();
                
                raceEnded = true; 
                showResultScreen();
            }
        }

        function showResultScreen() {
            document.body.style.overflow = 'auto';
            ui.game.classList.add('hidden');
            ui.result.classList.remove('hidden');
            
            const list = document.getElementById('resultList');
            list.innerHTML = '';
            const sorted = getSorted();
            lastRacePassedIds.clear(); lastRaceFailedIds.clear();
            
            list.className = "grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3";
            list.style.gridAutoFlow = "column";
            list.style.gridTemplateRows = `repeat(${Math.ceil(sorted.length / 2)}, auto)`;
            
            sorted.forEach((r, i) => {
                const rank = i + 1;
                const isQ = !r.retired && rank <= passCount;
                if(isQ) lastRacePassedIds.add(r.member.id); else lastRaceFailedIds.add(r.member.id);

                const div = document.createElement('div');
                div.className = `flex items-center gap-4 p-3 bg-[rgba(255,255,255,0.03)] border border-[rgba(255,255,255,0.05)] ${isQ ? 'border-l-4 border-l-[var(--theme-mint)] bg-[rgba(172,254,248,0.1)]' : ''} ${r.retired ? 'opacity-50 grayscale' : ''}`;
                
                div.innerHTML = `
                    <div class="w-12 text-center text-2xl ea-font-black text-white">${r.retired ? 'DNF' : rank}</div>
                    <div class="w-12 h-12 bg-gray-800 overflow-hidden border-2 flex-shrink-0" style="border-color:${r.member.color}; border-radius: 50% !important;">
                        <img src="${r.member.imgWebp}" crossorigin="anonymous" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xl ea-font-black uppercase truncate" style="color: ${isQ ? 'white' : '#9ca3af'}">${r.member.name}</div>
                        <div class="text-md ea-font text-gray-400">${r.finishTimeStr || 'DNF'}</div>
                    </div>
                    <div class="w-24 text-right text-xl ea-font-black ${isQ ? 'text-[#acfef8]' : 'text-red-500'}">
                        ${isQ ? '합격' : (r.retired ? '리타이어' : '탈락')}
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('captureBtn').querySelector('span').textContent = '결과 복사';
        }

        function captureResultsText() {
            const span = document.getElementById('captureBtn').querySelector('span');
            span.textContent = '복사 중...';
            const sorted = getSorted();
            let textResult = "순위\t드라이버\t기록\t상태\n";
            sorted.forEach((r, i) => {
                const rank = r.retired ? 'DNF' : (i + 1);
                const time = r.finishTimeStr || 'DNF';
                const status = (!r.retired && (i + 1) <= passCount) ? '합격' : (r.retired ? '리타이어' : '탈락');
                textResult += `${rank}\t${r.member.name}\t${time}\t${status}\n`;
            });

            const textArea = document.createElement("textarea");
            textArea.value = textResult; document.body.appendChild(textArea); textArea.select();
            try { document.execCommand('copy'); span.textContent = '텍스트 복사 완료!'; } catch (err) { span.textContent = '복사 실패'; }
            document.body.removeChild(textArea);
            setTimeout(() => { span.textContent = '결과 텍스트 복사'; }, 2500);
        }

        function returnToMenu() {
            setFastForward(false); 
            gameRunning = false; 
            document.body.style.overflow = 'hidden'; 
            ui.result.classList.add('hidden');
            ui.menu.classList.remove('hidden');
            passCount = null; selectedMembers.clear(); updateSelectionUI();
            
            if(lastRacePassedIds.size > 0 || lastRaceFailedIds.size > 0) {
                document.getElementById('selectPassedBtn').classList.remove('hidden');
                document.getElementById('selectFailedBtn').classList.remove('hidden');
            }
        }

        init();

    </script>
</body>
</html>
