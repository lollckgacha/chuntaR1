<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레귤러원 천타버스 그랑프리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:ital,wght@0,400;0,700;0,900;1,900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    
    <style>
        /* EA F1 Base Style */
        :root {
            --theme-mint: #acfef8;
            --ea-dark: #0a0a0f;
            --ea-panel: rgba(20, 20, 25, 0.85);
            --ea-border: rgba(255, 255, 255, 0.15);
            --ea-cyan: #00d2ff;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--ea-dark); color: white; margin: 0; padding: 0; }
        .ea-font { font-family: 'Rajdhani', 'Noto Sans KR', sans-serif; font-style: italic; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .ea-font-black { font-family: 'Noto Sans KR', sans-serif; font-style: italic; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        * { border-radius: 0 !important; outline: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.8); }
        ::-webkit-scrollbar-thumb { background: var(--theme-mint); }

        .menu-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 70% 30%, rgba(172, 254, 248, 0.15) 0%, var(--ea-dark) 60%);
        }
        .menu-bg::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
        }

        .ea-panel {
            background: linear-gradient(135deg, rgba(30, 30, 35, 0.95) 0%, rgba(15, 15, 20, 0.95) 100%);
            border: 1px solid var(--ea-border);
            backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
        }
        .ea-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 40px; height: 3px; background: var(--theme-mint); }

        .ea-btn {
            background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--ea-border);
            transform: skewX(-15deg); transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }
        .ea-btn > span { display: block; transform: skewX(15deg); }
        .ea-btn:hover:not(:disabled) {
            background: white; color: black; border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.3); transform: skewX(-15deg) scale(1.02);
        }
        .ea-btn:disabled { background: rgba(255, 255, 255, 0.02); color: rgba(255,255,255,0.3); cursor: not-allowed; }
        
        .ea-btn-primary { background: var(--theme-mint); border-color: var(--theme-mint); color: var(--ea-dark); }
        .ea-btn-primary:hover:not(:disabled) { background: #8de5dd; border-color: #8de5dd; color: var(--ea-dark); box-shadow: 0 0 30px rgba(172, 254, 248, 0.5); }

        /* Driver Cards */
        .driver-card {
            background: #111; border: 1px solid var(--ea-border); position: relative; overflow: hidden; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); aspect-ratio: 3/4;
        }
        .driver-card img { width: 100%; height: 100%; object-fit: cover; object-position: top; transition: transform 0.5s ease, filter 0.3s ease; filter: grayscale(100%) brightness(0.6); }
        .driver-card .card-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 50%, transparent 100%); z-index: 10; }
        .driver-card .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 12px; z-index: 20; transform: translateY(5px); transition: transform 0.3s ease; }
        .driver-card:hover:not(.selected) img { transform: scale(1.05); filter: grayscale(50%) brightness(0.8); }
        .driver-card:hover:not(.selected) .card-info { transform: translateY(0); }
        .driver-card.selected { border-color: var(--theme-mint); box-shadow: 0 0 20px rgba(172, 254, 248, 0.3); transform: translateY(-5px); }
        .driver-card.selected img { filter: grayscale(0%) brightness(1.1); transform: scale(1.05); }
        .driver-card.selected .card-info { transform: translateY(0); }
        .driver-card.selected::after { content: ''; position: absolute; top: 0; right: 0; width: 30px; height: 30px; background: linear-gradient(225deg, var(--theme-mint) 50%, transparent 50%); z-index: 30; }

        .num-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--ea-border); color: white; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
        .num-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .num-btn.selected { background: var(--theme-mint); border-color: var(--theme-mint); color: var(--ea-dark); font-weight: 900; box-shadow: 0 0 15px rgba(172, 254, 248, 0.4); }
        .num-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        #gameScreen { overflow: hidden; }
        #gameCanvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        
        .telemetry-tower { position: absolute; top: 30px; left: 30px; z-index: 20; width: 280px; }
        .telemetry-header { background: var(--theme-mint); color: var(--ea-dark); padding: 6px 16px; font-size: 1.2rem; display: flex; justify-content: space-between; clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%); margin-bottom: 4px; }
        .telemetry-row { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(5px); display: flex; align-items: center; padding: 4px 0; margin-bottom: 2px; border-left: 4px solid transparent; transition: all 0.3s; }
        .telemetry-row.qualified { border-left-color: var(--theme-mint); background: rgba(172, 254, 248, 0.15); }
        .telemetry-row.retired { opacity: 0.5; filter: grayscale(1); }
        .tel-rank { width: 35px; text-align: center; font-size: 1.2rem; }
        .tel-color { width: 4px; height: 24px; margin-right: 12px; }
        .tel-name { flex: 1; font-size: 1rem; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tel-time { font-size: 0.8rem; color: #cbd5e1; padding-right: 8px; font-family: monospace; }
        .tel-status { font-size: 1.2rem; color: #facc15; padding-right: 12px; width: 30px; text-align: right;}
        .tel-status.out { font-size: 0.8rem; color: #ef4444; width: 45px; font-weight: bold; }

        /* Minimap */
        #minimapContainer {
            position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px;
            background: rgba(10, 10, 15, 0.7); border: 2px solid rgba(255,255,255,0.1); border-radius: 50% !important;
            z-index: 20; overflow: hidden; backdrop-filter: blur(4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #minimapCanvas { width: 100%; height: 100%; display: block; border-radius: 50% !important; }
        .lap-counter-box { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--theme-mint); color: var(--ea-dark); padding: 2px 10px; font-size: 1.1rem; font-weight: 900; font-style: italic; z-index: 25; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }

        #eventToastContainer { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
        .ea-toast { display: flex; background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255,255,255,0.1); transform: skewX(-15deg); animation: slideUpEA 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .ea-toast-tag { padding: 8px 16px; font-size: 1.2rem; color: black; }
        .ea-toast-msg { padding: 8px 24px; color: white; font-size: 1.2rem; }
        .ea-toast-inner { display: flex; transform: skewX(15deg); }
        .toast-yellow { border-bottom: 3px solid #facc15; } .toast-yellow .ea-toast-tag { background: #facc15; }
        .toast-red { border-bottom: 3px solid #ef4444; } .toast-red .ea-toast-tag { background: #ef4444; color: white; }
        .toast-green { border-bottom: 3px solid #22c55e; } .toast-green .ea-toast-tag { background: #22c55e; color: white; }
        .toast-mint { border-bottom: 3px solid var(--theme-mint); } .toast-mint .ea-toast-tag { background: var(--theme-mint); color: var(--ea-dark); }
        @keyframes slideUpEA { 0% { opacity: 0; transform: skewX(-15deg) translateY(40px); } 100% { opacity: 1; transform: skewX(-15deg) translateY(0); } }

        #centerAlert { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 60; pointer-events: none; }
        .alert-text { font-size: 8rem; color: white; text-shadow: 0px 10px 30px rgba(0,0,0,0.9); margin: 0; line-height: 1; text-align: center; animation: popInEA 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popInEA { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .speed-lines { position: fixed; inset: 0; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; background: repeating-radial-gradient(circle at center, transparent 0, transparent 40px, rgba(0, 210, 255, 0.05) 41px, rgba(0, 210, 255, 0.05) 45px); animation: tunnel 0.3s linear infinite; }
        .speed-lines.active { opacity: 1; }
        @keyframes tunnel { to { background-size: 120% 120%; } }

        .loading-overlay { position: fixed; inset: 0; background: var(--ea-dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--theme-mint); animation: spin 1s linear infinite; border-radius: 50% !important; }
        
        #inGameUI { position: absolute; top: 30px; right: 30px; z-index: 100; display: flex; align-items: center; gap: 12px; }
        #inGameUI button { background: rgba(0,0,0,0.6); border: 1px solid var(--theme-mint); color: white; font-size: 1.5rem; cursor: pointer; padding: 8px 16px; transition: 0.2s; }
        #inGameUI button:hover { background: var(--theme-mint); color: black; }

        #ffwdIndicator { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 24px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px !important; z-index: 100; pointer-events: none; backdrop-filter: blur(5px); }
        #ffwdIndicator span.ffwd-icon { color: var(--theme-mint); margin-right: 8px; }

        /* Race Timer */
        #raceTimerDisplay { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 3rem; z-index: 25; text-shadow: 0 4px 15px rgba(0,0,0,0.9); opacity: 0; transition: opacity 0.5s; pointer-events: none; }

        /* Custom range sliders for settings */
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.2); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: var(--theme-mint); cursor: pointer; border-radius: 50% !important; }

        /* Result Screen Scrollable base */
        #resultScreen { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; background: rgba(10,10,15,0.98); z-index: 50; overflow-y: auto; padding: 3rem 1rem; }
    </style>
</head>
<body>

    <!-- Loading -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-center">
            <div class="spinner mx-auto mb-8"></div>
            <p class="text-white text-3xl ea-font tracking-widest text-gray-400">리소스 로딩 중 <span id="loadProgress" class="text-white ml-2">0/12</span></p>
        </div>
    </div>

    <!-- Intro Overlay Prompt -->
    <div id="introPromptOverlay" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-center justify-center backdrop-blur-sm">
        <div class="ea-panel p-10 text-center w-full max-w-lg">
            <h2 class="text-3xl ea-font-black text-white mb-4">오프닝을 재생하시겠습니까?</h2>
            <p class="text-gray-400 mb-10 ea-font">(나중에 설정에서 다시 보실 수 있습니다.)</p>
            <div class="flex gap-4 justify-center">
                <button class="ea-btn ea-btn-primary px-10 py-4 flex-1 text-xl" onclick="playIntro()"><span>예</span></button>
                <button class="ea-btn px-10 py-4 flex-1 text-xl" onclick="skipIntroPrompt()"><span>아니오</span></button>
            </div>
        </div>
    </div>

    <!-- Intro Video Player -->
    <div id="videoOverlay" class="hidden fixed inset-0 bg-black z-[300]">
        <video id="introVideo" class="w-full h-full object-contain" src="R1.mkv"></video>
        <button class="absolute top-8 right-8 ea-btn px-6 py-3 z-10 text-xl font-bold" onclick="skipIntroVideo()"><span>SKIP ▶▶</span></button>
    </div>

    <!-- Main Menu -->
    <div id="menuScreen" class="min-h-screen flex flex-col relative opacity-0 transition-opacity duration-500 hidden">
        <div class="menu-bg"></div>
        <header class="w-full pt-8 pb-4 px-12 flex justify-between items-end border-b border-[rgba(255,255,255,0.1)]">
            <div class="flex items-center gap-6">
                <img src="logo2.png" alt="R1 Logo" class="h-12 object-contain filter brightness-0 invert opacity-80">
                <h1 class="text-4xl text-white ea-font-black m-0 leading-none">R1 <span class="text-[#acfef8]">그랑프리™</span></h1>
            </div>
            <div class="hidden lg:flex gap-8 text-gray-400 ea-font text-xl">
                <span class="text-[#acfef8] border-b-2 border-[#acfef8] pb-1 cursor-default">레이스 설정</span>
                <span class="hover:text-white cursor-pointer transition-colors" onclick="openSettings()">환경설정</span>
            </div>
        </header>

        <div class="flex-1 w-full max-w-[1600px] mx-auto p-8 flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                <div class="ea-panel p-6">
                    <h3 class="ea-font text-2xl text-gray-300 mb-6">세션 설정</h3>
                    
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">합격 인원 설정</span>
                            <span id="qualifyText" class="ea-font-black text-xl text-[#acfef8]">-</span>
                        </div>
                        <div id="passCountWrapper" class="num-grid"></div>
                    </div>

                    <!-- Laps Setting -->
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">랩 수 설정 (LAPS)</span>
                            <span id="lapSettingText" class="ea-font-black text-xl text-[#acfef8]">1 LAP</span>
                        </div>
                        <div class="flex gap-2">
                            <button class="ea-btn flex-1 py-2 lap-btn ea-btn-primary" data-laps="1"><span>1</span></button>
                            <button class="ea-btn flex-1 py-2 lap-btn" data-laps="2"><span>2</span></button>
                            <button class="ea-btn flex-1 py-2 lap-btn" data-laps="3"><span>3</span></button>
                            <button class="ea-btn flex-1 py-2 lap-btn" data-laps="5"><span>5</span></button>
                        </div>
                    </div>

                    <!-- Participant Selection -->
                    <div class="mb-8 pt-4 border-t border-[rgba(255,255,255,0.1)]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="ea-font text-lg text-white">참가자 일괄 선택</span>
                        </div>
                        <div class="flex gap-2">
                            <button id="selectAllBtn" class="ea-btn flex-1 py-3 ea-font text-sm"><span>전체 선택</span></button>
                            <button id="selectPassedBtn" class="ea-btn flex-1 py-3 ea-font text-sm hidden"><span>이전 합격자</span></button>
                            <button id="selectFailedBtn" class="ea-btn flex-1 py-3 ea-font text-sm hidden"><span>이전 탈락자</span></button>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-[rgba(255,255,255,0.1)]">
                        <div class="flex justify-between text-sm text-gray-400 mb-2 ea-font">
                            <span>선택된 드라이버</span>
                            <span id="selectedCount" class="text-white font-bold">0 / 12</span>
                        </div>
                        <button id="startBtn" class="ea-btn ea-btn-primary w-full py-4 text-2xl ea-font-black mt-2" disabled>
                            <span>레이스 시작</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-2/3">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="ea-font text-3xl text-white m-0">드라이버 라인업</h3>
                </div>
                <div id="memberGrid" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-4 xl:grid-cols-6 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 z-[150] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="ea-panel p-8 w-full max-w-md border border-[rgba(172,254,248,0.3)] shadow-[0_0_30px_rgba(0,0,0,0.8)]">
            <h2 class="text-3xl ea-font-black text-white mb-6">오디오 환경설정</h2>

            <div class="mb-8">
                <label class="block ea-font text-gray-300 mb-3">엔진 사운드 타입</label>
                <div class="flex gap-2">
                    <button id="btnEngineNormal" class="ea-btn ea-btn-primary flex-1 py-2" onclick="setEngineType('normal')"><span>일반 자동차</span></button>
                    <button id="btnEngineF1" class="ea-btn flex-1 py-2" onclick="setEngineType('f1')"><span>F1 스타일</span></button>
                </div>
                <div class="mt-3 flex justify-between">
                    <button class="ea-btn py-2 px-4 text-sm bg-gray-800" onclick="playIntroFromSettings()"><span>🎬 오프닝 보기</span></button>
                    <button id="btnPreviewSound" class="ea-btn py-2 px-6 text-sm bg-gray-800" onclick="previewEngineSound()"><span>🔊 사운드 미리듣기</span></button>
                </div>
            </div>

            <div class="mb-8">
                <label class="block ea-font text-gray-300 mb-3 flex justify-between">
                    <span>배경음악 (BGM) 볼륨</span> <span id="bgmVolText" class="text-[#acfef8] font-bold">30%</span>
                </label>
                <input type="range" id="bgmSlider" min="0" max="100" value="30" oninput="updateSettingsVolume()">
            </div>

            <div class="mb-10">
                <label class="block ea-font text-gray-300 mb-3 flex justify-between">
                    <span>효과음/엔진 (SFX) 볼륨</span> <span id="sfxVolText" class="text-[#acfef8] font-bold">30%</span>
                </label>
                <input type="range" id="sfxSlider" min="0" max="100" value="30" oninput="updateSettingsVolume()">
            </div>

            <button onclick="closeSettings()" class="ea-btn w-full py-4 text-xl ea-font-black"><span>닫기</span></button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden fixed inset-0 bg-black">
        <canvas id="gameCanvas"></canvas>
        <div id="speedLines" class="speed-lines"></div>
        
        <div id="raceTimerDisplay" class="ea-font-black text-white">00:00.000</div>

        <!-- Fast Forward Indicator -->
        <div id="ffwdIndicator" class="hidden">
            <span class="ffwd-icon">▶▶</span><span class="ea-font-black">FAST FORWARD</span>
        </div>

        <!-- Telemetry Tower -->
        <div class="telemetry-tower" id="leaderboard" style="opacity: 0; transition: opacity 0.5s;">
            <div class="telemetry-header ea-font-black">
                <span>R1 그랑프리</span>
                <span id="lapInfo">LAP 1/1</span>
            </div>
            <div id="rankingList"></div>
        </div>

        <!-- Minimap -->
        <div id="minimapContainer">
            <canvas id="minimapCanvas"></canvas>
            <div class="lap-counter-box" id="minimapLapText">L1</div>
        </div>

        <!-- In-game UI Controls -->
        <div id="inGameUI">
            <button id="muteBtn" onclick="toggleMute()">🔊</button>
            <button onclick="openSettings()">⚙️</button>
        </div>

        <!-- Alerts -->
        <div id="centerAlert" class="hidden">
            <p class="alert-text ea-font-black" id="centerAlertText"></p>
        </div>
        <div id="eventToastContainer"></div>
    </div>

    <!-- Result Screen (Scrolling Modal) -->
    <div id="resultScreen" class="hidden">
        <!-- 캡쳐를 위한 래퍼 추가 -->
        <div id="fullCaptureArea" class="w-full max-w-6xl mx-auto ea-panel p-0 flex flex-col bg-[#0a0a0f]">
            <div class="bg-black border-b border-[rgba(255,255,255,0.1)] p-6 lg:p-10 flex justify-between items-center">
                <div>
                    <div class="text-[#acfef8] ea-font text-xl mb-1">공식 기록 (OFFICIAL DOCUMENT)</div>
                    <h2 class="text-5xl text-white ea-font-black m-0">최종 레이스 결과</h2>
                </div>
                <img src="logo2.png" crossorigin="anonymous" class="h-10 filter brightness-0 invert opacity-50 hidden sm:block">
            </div>

            <!-- Header Labels -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-6 lg:px-10 py-3 bg-[rgba(255,255,255,0.05)] ea-font text-gray-400 text-sm border-b border-[rgba(255,255,255,0.1)]">
                <div class="flex">
                    <div class="w-12 text-center">순위</div>
                    <div class="flex-1 ml-4">드라이버</div>

            { id: 6, name: '한아밍', imgWebp: baseUrl + '06.webp', imgJpg: baseUrl + '06.jpg', color: '#FEC0C2' },

            { id: 8, name: '캬앙', imgWebp: baseUrl + '08.webp', imgJpg: baseUrl + '08.jpg', color: '#FF5A4D' },
            { id: 9, name: '김웰로', imgWebp: baseUrl + '09.webp', imgJpg: baseUrl + '09.jpg', color: '#BFEF90' },
            { id: 10, name: '모카', imgWebp: baseUrl + '10.webp', imgJpg: baseUrl + '10.jpg', color: '#5E8EFF' },
            { id: 11, name: '달타', imgWebp: baseUrl + '11.webp', imgJpg: baseUrl + '11.jpg', color: '#FFC462' },

        let selectedMembers = new Set();

        let sfxVolume = 0.3;

        let audioCtx = null;

        let engineGain = null;

        let trackCurve = null;
        let trackLength = 0;
        let runners = [];
        let trackWidth = 45; 
        
        let gameRunning = false;
        let gamePaused = false; 
        let raceStarted = false;
        let raceEnded = false;
        let isTransitioningToResult = false;
        let startingSequence = false;
        let lastTime = 0;
        let gameTime = 0;
        let raceTimer = 0;
        
        let isFastForwarding = false;

        let cameraTimer = 0;

        let dnfSchedule = [];

        window._camTargetPos = new THREE.Vector3();
        window._camLookAtPos = new THREE.Vector3();
        window._smoothLeaderPos = 0;

        const ui = {

            lapInfo: document.getElementById('lapInfo'),
            centerAlert: document.getElementById('centerAlert'),
            centerText: document.getElementById('centerAlertText'),
            toastContainer: document.getElementById('eventToastContainer'),
            qualifyText: document.getElementById('qualifyText'),
            lapSettingText: document.getElementById('lapSettingText'),
            minimapCanvas: document.getElementById('minimapCanvas'),
            minimapLapText: document.getElementById('minimapLapText'),
            ffwdIndicator: document.getElementById('ffwdIndicator'),

            speedLines: document.getElementById('speedLines')

        function init() {
            createMemberGrid();
            renderPassButtons();
            setupLapButtons();
            preloadImages();

            document.getElementById('selectAllBtn').onclick = () => {
                if (selectedMembers.size === members.length) selectedMembers.clear();
                else members.forEach(m => selectedMembers.add(m.id));
                updateSelectionUI();
            };
            document.getElementById('selectPassedBtn').onclick = () => applyPrev(lastRacePassedIds);
            document.getElementById('selectFailedBtn').onclick = () => applyPrev(lastRaceFailedIds);
            ui.startBtn.onclick = startRaceTransition;
            
            document.getElementById('captureBtn').onclick = captureResults;
            document.getElementById('replayBtn').onclick = returnToMenu;

            const handleFfwdStart = (e) => { if(gameRunning && raceStarted && !raceEnded && !gamePaused && e.target.tagName === 'CANVAS') setFastForward(true); };
            const handleFfwdEnd = () => { setFastForward(false); };
            
            document.addEventListener('mousedown', handleFfwdStart);
            document.addEventListener('mouseup', handleFfwdEnd);
            document.addEventListener('touchstart', handleFfwdStart);
            document.addEventListener('touchend', handleFfwdEnd);

            window.addEventListener('wheel', (e) => {
                if (gameRunning && raceStarted && !gamePaused) {
                    zoomFactor += e.deltaY * 0.001;
                    zoomFactor = Math.max(0.4, Math.min(3.0, zoomFactor));
                }
            });
        }

        // --- Intro Video Logic ---
        function playIntro() {
            document.getElementById('introPromptOverlay').classList.add('hidden');
            const vidOverlay = document.getElementById('videoOverlay');
            const vid = document.getElementById('introVideo');
            vidOverlay.classList.remove('hidden');
            vid.play().catch(e => { skipIntroVideo(); }); 
            vid.onended = () => { skipIntroVideo(); };
        }

        function skipIntroPrompt() {
            document.getElementById('introPromptOverlay').classList.add('hidden');
            showMainMenu();
        }

        function skipIntroVideo() {
            const vid = document.getElementById('introVideo');
            vid.pause();
            vid.currentTime = 0;
            document.getElementById('videoOverlay').classList.add('hidden');
            showMainMenu();
        }

        function playIntroFromSettings() {
            closeSettings();
            document.getElementById('menuScreen').classList.add('hidden');
            playIntro();
        }

        function showMainMenu() {
            ui.menu.classList.remove('hidden');
            setTimeout(() => {
                ui.menu.classList.remove('opacity-0');
            }, 50);
        }

        // --- Utils & Formatting ---
        function formatTime(sec) {
            if (isNaN(sec) || !sec) return "--:--.---";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            const ms = Math.floor((sec % 1) * 1000);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
        }

        // --- Settings Management ---
        function openSettings() {
            gamePaused = true;
            ui.settingsModal.classList.remove('hidden');
            stopEngineSound();
            if(bgm) bgm.pause();
        }
        function closeSettings() {
            ui.settingsModal.classList.add('hidden');
            gamePaused = false;
            lastTime = performance.now(); 
            if(raceStarted && !raceEnded && !isTransitioningToResult) {
                startEngineSound();
                if(bgm) bgm.play().catch(()=>{});
            }
        }
        function setEngineType(type) {
            engineType = type;
            const btnF1 = document.getElementById('btnEngineF1');
            const btnNormal = document.getElementById('btnEngineNormal');
            if(type === 'f1') {
                btnF1.classList.add('ea-btn-primary'); btnNormal.classList.remove('ea-btn-primary');
            } else {
                btnF1.classList.remove('ea-btn-primary'); btnNormal.classList.add('ea-btn-primary');
            }
        }
        function updateSettingsVolume() {
            bgmVolume = document.getElementById('bgmSlider').value / 100;
            sfxVolume = document.getElementById('sfxSlider').value / 100;
            document.getElementById('bgmVolText').textContent = Math.round(bgmVolume * 100) + '%';
            document.getElementById('sfxVolText').textContent = Math.round(sfxVolume * 100) + '%';
            if(bgm) bgm.volume = isMuted ? 0 : bgmVolume;
        }
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
            if(bgm) bgm.volume = isMuted ? 0 : bgmVolume;
        }

        function setFastForward(active) {
            isFastForwarding = active;
            if (active) {
                ui.ffwdIndicator.classList.remove('hidden');
                if (ui.speedLines) ui.speedLines.classList.add('active');
            } else {
                ui.ffwdIndicator.classList.add('hidden');
                if (ui.speedLines) ui.speedLines.classList.remove('active');
            }
            if (bgm) bgm.playbackRate = active ? 1.5 : 1.0;
        }

        function preloadImages() {
            let loaded = 0;
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            
            members.forEach(m => {
                loader.load(m.imgJpg, (tex) => {
                    tex.magFilter = THREE.LinearFilter; tex.minFilter = THREE.LinearFilter;
                    preloadedTextures[m.id] = tex;
                    loaded++; document.getElementById('loadProgress').textContent = `${loaded}/${members.length}`;
                    if (loaded === members.length) onAllLoaded();
                }, undefined, () => {
                    loaded++; if (loaded === members.length) onAllLoaded();
                });
            });
            
            function onAllLoaded() {
                allImagesLoaded = true; 
                document.getElementById('loadingOverlay').style.display = 'none'; 
                updateStartBtnState();
                document.getElementById('introPromptOverlay').classList.remove('hidden');
            }
        }

        function createMemberGrid() {
            ui.grid.innerHTML = '';
            members.forEach(m => {
                const card = document.createElement('div');
                card.className = 'driver-card';
                card.dataset.id = m.id;
                card.innerHTML = `
                    <img src="${m.imgWebp}" crossorigin="anonymous" alt="${m.name}">
                    <div class="card-overlay"></div>
                    <div class="card-info">
                        <div class="w-6 h-1 mb-1" style="background-color: ${m.color}"></div>
                        <div class="ea-font-black text-xl leading-none text-white tracking-wide truncate">${m.name}</div>
                    </div>
                `;
                card.onclick = () => {
                    if (selectedMembers.has(m.id)) selectedMembers.delete(m.id);
                    else selectedMembers.add(m.id);
                    updateSelectionUI();
                };
                ui.grid.appendChild(card);
            });
        }

        function updateSelectionUI() {
            document.querySelectorAll('.driver-card').forEach((card, idx) => {
                if (selectedMembers.has(members[idx].id)) card.classList.add('selected');
                else card.classList.remove('selected');
            });
            document.getElementById('selectedCount').textContent = `${selectedMembers.size}명 선택됨`;
            document.getElementById('selectAllBtn').querySelector('span').textContent = selectedMembers.size === members.length ? '선택 해제' : '전체 선택';
            
            const maxPass = Math.max(1, selectedMembers.size - 1);
            if (passCount > maxPass) passCount = null;
            renderPassButtons();
            updateStartBtnState();
        }

        function renderPassButtons() {
            ui.passWrapper.innerHTML = '';
            const max = selectedMembers.size >= 2 ? selectedMembers.size - 1 : 0;
            for(let i=1; i<=11; i++) {
                const btn = document.createElement('button');
                btn.className = `num-btn ea-font ${passCount === i ? 'selected' : ''}`;
                btn.textContent = i;
                btn.disabled = i > max;
                if (!btn.disabled) {
                    btn.onclick = () => { 
                        passCount = (passCount === i) ? null : i; 
                        ui.qualifyText.textContent = passCount ? `상위 ${passCount}명` : '-';
                        renderPassButtons(); updateStartBtnState(); 
                    };
                }
                ui.passWrapper.appendChild(btn);
            }
        }

        function setupLapButtons() {
            document.querySelectorAll('.lap-btn').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.lap-btn').forEach(b => b.classList.remove('ea-btn-primary'));
                    const target = e.currentTarget;
                    target.classList.add('ea-btn-primary');
                    selectedLaps = parseInt(target.dataset.laps);
                    ui.lapSettingText.textContent = `${selectedLaps} LAP${selectedLaps > 1 ? 'S' : ''}`;
                };
            });
        }

        function applyPrev(setIds) {
            selectedMembers.clear();
            setIds.forEach(id => selectedMembers.add(id));
            updateSelectionUI();
        }

        function updateStartBtnState() {
            if (!allImagesLoaded) { ui.startBtn.disabled = true; ui.startSpan.textContent = '로딩 중...'; }
            else if (selectedMembers.size < 2) { ui.startBtn.disabled = true; ui.startSpan.textContent = '2명 이상 선택'; }
            else if (passCount === null) { ui.startBtn.disabled = true; ui.startSpan.textContent = '합격 인원 설정'; }
            else { ui.startBtn.disabled = false; ui.startSpan.textContent = '레이스 시작'; }
        }

        // --- Sound System ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function previewEngineSound() {
            if (isPreviewing) return;
            isPreviewing = true;
            initAudio(); 
            
            const osc = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (engineType === 'f1') {
                osc.type = 'sawtooth';
                osc2.type = 'square';
            } else {
                osc.type = 'sawtooth';
                osc2.type = 'sawtooth';
            }

            osc.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (engineType === 'f1') {
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(600, now + 1.5);
                osc2.frequency.setValueAtTime(202, now);
                osc2.frequency.linearRampToValueAtTime(606, now + 1.5);
                gain.gain.setValueAtTime(sfxVolume * 0.1, now);
            } else {
                // 더 낮고 묵직한 베이스 엔진음 피치
                osc.frequency.setValueAtTime(10, now);
                osc.frequency.linearRampToValueAtTime(40, now + 1.5);
                osc2.frequency.setValueAtTime(9.8, now);
                osc2.frequency.linearRampToValueAtTime(39, now + 1.5);
                gain.gain.setValueAtTime(sfxVolume * 0.4, now);
            }
            
            gain.gain.linearRampToValueAtTime(0, now + 2.0);
            
            osc.start(now); osc2.start(now);
            osc.stop(now + 2.0); osc2.stop(now + 2.0);
            
            setTimeout(() => { isPreviewing = false; }, 2000);
        }

        function playSound(type) {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
                gain.gain.setValueAtTime(sfxVolume * 1.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'beep') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(sfxVolume * 0.4, now);
                gain.gain.setValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'beep_high') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(sfxVolume * 0.5, now);
                gain.gain.setValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function startEngineSound() {
            if (isMuted || !audioCtx || raceEnded || isTransitioningToResult) return;
            engineOsc = audioCtx.createOscillator();
            engineOsc2 = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            
            if (engineType === 'f1') {
                engineOsc.type = 'sawtooth';
                engineOsc2.type = 'square';
            } else {
                engineOsc.type = 'triangle';
                engineOsc2.type = 'sawtooth';
            }

            engineOsc.connect(engineGain);
            engineOsc2.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            
            engineGain.gain.value = 0;
            engineOsc.start();
            engineOsc2.start();
        }

        function updateEngineSound(leaderSpeed) {
            if (isMuted || raceEnded || gamePaused || isTransitioningToResult) { 
                if(engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                return; 
            }
            if (!engineOsc) startEngineSound();
            if (engineOsc && engineGain) {
                let pitch, pitch2;
                if (engineType === 'f1') {
                    pitch = 200 + (leaderSpeed || 0) * 4.0;
                    pitch2 = pitch * 1.01;
                } else {
                    pitch = 10 + (leaderSpeed || 0) * 0.6;
                    pitch2 = pitch * 1.02; 
                }

                engineOsc.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);
                engineOsc2.frequency.setTargetAtTime(pitch2, audioCtx.currentTime, 0.1); 
                
                const vol = sfxVolume * (engineType === 'f1' ? 0.1 : 0.4); 
                engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
            }
        }

        function stopEngineSound() {
            if (engineGain) {
                engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
                setTimeout(() => { 
                    if(engineOsc) { engineOsc.stop(); engineOsc2.stop(); engineOsc=null; engineOsc2=null; engineGain=null; } 
                }, 400);
            }
        }

        function playBGM() {
            if(bgm) { bgm.pause(); bgm.src=''; }
            bgm = new Audio('https://raw.githubusercontent.com/Cren0p/CRD/refs/heads/main/chuntaverse.mp3');
            bgm.volume = isMuted ? 0 : bgmVolume;
            bgm.loop = true; 
            bgm.playbackRate = isFastForwarding ? 1.5 : 1.0;
            bgm.play().catch(() => { document.addEventListener('click', () => bgm.play().catch(()=>{}), {once: true}); });
        }

        function stopBGM() {
            if (bgm) {
                const fadeInterval = setInterval(() => {
                    if (bgm.volume > 0.05) bgm.volume = Math.max(0, bgm.volume - 0.05);
                    else { bgm.pause(); bgm.currentTime = 0; clearInterval(fadeInterval); }
                }, 70);
            }
        }

        function startRaceTransition() {
            initAudio(); 
            document.body.style.overflow = 'hidden';
            ui.menu.classList.add('hidden');
            ui.game.classList.remove('hidden');
            ui.raceTimerDisplay.style.opacity = '0';
            ui.raceTimerDisplay.textContent = '00:00.000';
            if(ui.speedLines) ui.speedLines.classList.remove('active');
            
            runners = []; gameTime = 0; raceTimer = 0;
            raceStarted = false; raceEnded = false; isTransitioningToResult = false; startingSequence = true; gamePaused = false;
            zoomFactor = 1.0;
            eventFocusTimer = 0; activeEventTargets = [];
            window._smoothLeaderPos = 0; 
            window._prevPackLeader = null; 
            window._actualTimeScale = 1.0;
            
            ui.lbContainer.style.opacity = '0';
            ui.toastContainer.innerHTML = '';
            ui.lapInfo.textContent = `LAP 1/${selectedLaps}`;
            ui.minimapLapText.textContent = `L1`;
            
            playBGM();
            initEngine();
            initMinimap();
            planDNFs(); 
        }

        // --- DNF Planning (Survive 1-2 Failers) ---
        function planDNFs() {
            dnfSchedule = [];
            const totalDrivers = selectedMembers.size;
            const toFailCount = totalDrivers - passCount;
            if (toFailCount <= 0) return;
            
            // 합격 인원 외에 1~2명은 리타이어 없이 끝까지 완주하도록 설정 (순위만 밀림)
            const survivorsAmongFailers = Math.min(toFailCount, Math.floor(Math.random() * 2) + 1);
            const targetDnfCount = toFailCount - survivorsAmongFailers;
            
            let dnfEvents = [];
            
            if (targetDnfCount > 0) {
                // 전체 탈락자가 3명 이상이고, 실제 DNF 시킬 인원이 2명 이상이면 무조건 동반 탈락(double) 1회 포함
                if (toFailCount >= 3 && targetDnfCount >= 2) {
                    dnfEvents.push({ type: 'double' }); // 2명 리타이어
                    for(let i=0; i < targetDnfCount - 2; i++) {
                        dnfEvents.push({ type: 'single' });
                    }
                } else {
                    for(let i=0; i < targetDnfCount; i++) {
                        dnfEvents.push({ type: 'single' });
                    }
                }
            }

            // 타이어 펑크 이벤트는 DNF와 별개로 추가 (70% 확률로 1회 발생, 속도만 줄임)
            if (Math.random() < 0.7) {
                dnfEvents.push({ type: 'puncture' });
            }

            const totalDist = trackLength * selectedLaps;
            const minD = totalDist * 0.1;
            const maxD = totalDist * 0.85;
            
            // 이벤트 순서 무작위 섞기
            dnfEvents.sort(() => Math.random() - 0.5);

            const interval = (maxD - minD) / Math.max(1, dnfEvents.length);
            
            dnfEvents.forEach((evt, i) => {
                evt.pos = minD + i * interval + (Math.random() * interval * 0.6);
                evt.triggered = false;
                dnfSchedule.push(evt);
            });
        }

        function initEngine() {
            if (renderer) { renderer.dispose(); ui.game.querySelector('#canvasContainer')?.remove(); }
            
            const canvas = document.getElementById('gameCanvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.0015);

        function onResize() {

        function createFloorGeometry(curve, segments, leftOffset, rightOffset) {
            const points = curve.getSpacedPoints(segments);
            const vertices = []; const uvs = []; const indices = [];
            for (let i = 0; i <= segments; i++) {
                const p = points[i];
                let t = (i < segments) ? points[i+1].clone().sub(p).normalize() : points[0].clone().sub(points[segments-1]).normalize();
                const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                
                const v1 = p.clone().add(n.clone().multiplyScalar(leftOffset));
                const v2 = p.clone().add(n.clone().multiplyScalar(rightOffset));
                
                vertices.push(v1.x, v1.y, v1.z);
                vertices.push(v2.x, v2.y, v2.z);
                
                const u = i / segments;
                uvs.push(0, u); 
                uvs.push(1, u); 
            }
            for (let i = 0; i < segments; i++) {
                const base = i * 2; const next = (i + 1) * 2;
                indices.push(base, next, base+1);
                indices.push(next, next+1, base+1);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }

        function createAdWall(curve, offset, height, texture) {
            const segments = 1500;
            const points = curve.getSpacedPoints(segments);
            const vertices = []; const uvsFront = []; const uvsBack = []; const indicesFront = []; const indicesBack = [];
            for (let i = 0; i <= segments; i++) {
                const p = points[i];
                let t = (i < segments) ? points[i+1].clone().sub(p).normalize() : points[0].clone().sub(points[segments-1]).normalize();
                const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                
                const baseP = p.clone().add(n.clone().multiplyScalar(offset));
                const topP = baseP.clone().add(new THREE.Vector3(0, height, 0));
                
                vertices.push(baseP.x, baseP.y, baseP.z);
                vertices.push(topP.x, topP.y, topP.z);
                
                const u = i / segments;
                uvsFront.push(u, 0); uvsFront.push(u, 1);
                uvsBack.push(1-u, 0); uvsBack.push(1-u, 1);
            }
            for (let i = 0; i < segments; i++) {
                const base = i * 2; const next = (i + 1) * 2;
                indicesFront.push(base, next, base+1); indicesFront.push(next, next+1, base+1);
                indicesBack.push(base, base+1, next); indicesBack.push(next, base+1, next+1);
            }
            
            const geoFront = new THREE.BufferGeometry();
            geoFront.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geoFront.setAttribute('uv', new THREE.Float32BufferAttribute(uvsFront, 2));
            geoFront.setIndex(indicesFront); geoFront.computeVertexNormals();
            
            const geoBack = new THREE.BufferGeometry();
            geoBack.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geoBack.setAttribute('uv', new THREE.Float32BufferAttribute(uvsBack, 2));
            geoBack.setIndex(indicesBack); geoBack.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.6, side: THREE.FrontSide, color: 0xffffff });
            const group = new THREE.Group();
            group.add(new THREE.Mesh(geoFront, mat)); group.add(new THREE.Mesh(geoBack, mat));
            return group;
        }

        function createAdTexture(callback) {
            const canvas = document.createElement('canvas');
            const h = 512; 
            const ctx = canvas.getContext('2d');
            const adUrls = [
                'https://stimg.sooplive.com/NORMAL_BBS/3/12240993/355969e5106c7ddd9.png',
                'board1.png',
                'board2.png'
            ];

            let loadedImgs = [];
            let loadedCount = 0;

            const finalize = () => {
                if(loadedImgs.length === 0) {
                    canvas.width = 512; canvas.height = h;
                    ctx.fillStyle = '#111'; ctx.fillRect(0,0,512,h);
                    const tex = new THREE.CanvasTexture(canvas);
                    tex.userData = { aspect: 512/h };
                    callback(tex);
                    return;
                }

                let totalW = 0;
                loadedImgs.forEach(img => { totalW += h * (img.width / img.height); });
                
                const dummyW1 = h * 1.5;
                const dummyW2 = h * 2.5;
                totalW += dummyW1 + dummyW2;

                canvas.width = totalW;
                canvas.height = h;
                let x = 0;
                
                // 패턴 1
                ctx.fillStyle = '#111111'; ctx.fillRect(x, 0, dummyW1, h);
                ctx.fillStyle = '#facc15'; 
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+h/2,h/2); ctx.lineTo(x+h,0); ctx.lineTo(x+h,h/4); ctx.lineTo(x+h/2,h*0.75); ctx.lineTo(x,h/4); ctx.fill();
                x += dummyW1;

                // 배너 이미지 루프
                loadedImgs.forEach(img => {
                    const w = h * (img.width / img.height);
                    ctx.drawImage(img, x, 0, w, h);
                    x += w;
                });

                // 패턴 2
                ctx.fillStyle = '#0f172a'; ctx.fillRect(x, 0, dummyW2, h);
                ctx.strokeStyle = '#acfef8'; ctx.lineWidth = 10; ctx.strokeRect(x+20, 20, dummyW2-40, h-40);
                ctx.fillStyle = '#acfef8'; ctx.font = `italic 900 ${h*0.25}px 'Noto Sans KR'`; ctx.textAlign = "center"; ctx.textBaseline="middle"; 
                ctx.fillText("CHUNTAVERSE", x+dummyW2/2, h*0.4);
                ctx.fillStyle = '#ffffff'; ctx.font = `italic 700 ${h*0.15}px 'Rajdhani'`;
                ctx.fillText("GRAND PRIX", x+dummyW2/2, h*0.65);

                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
                tex.userData = { aspect: totalW / h }; 
                callback(tex);
            };

            adUrls.forEach(url => {
                const img = new Image(); img.crossOrigin = 'anonymous';
                img.onload = () => { loadedImgs.push(img); loadedCount++; if(loadedCount===adUrls.length) finalize(); };
                img.onerror = () => { 
                    // 로드 실패 시 가상 배너로 대체
                    const dummyCanvas = document.createElement('canvas'); dummyCanvas.width = 768; dummyCanvas.height = 512; 
                    const dCtx = dummyCanvas.getContext('2d');
                    dCtx.fillStyle = '#0f172a'; dCtx.fillRect(0,0,768,512);
                    dCtx.fillStyle = '#facc15'; dCtx.beginPath(); dCtx.moveTo(0,0); dCtx.lineTo(256,256); dCtx.lineTo(512,0); dCtx.lineTo(512,128); dCtx.lineTo(256,384); dCtx.lineTo(0,128); dCtx.fill();
                    dCtx.strokeStyle = '#acfef8'; dCtx.lineWidth = 10; dCtx.strokeRect(300, 20, 448, 472);
                    dCtx.fillStyle = '#acfef8'; dCtx.font = "italic 900 80px 'Noto Sans KR'"; dCtx.textAlign = "center"; dCtx.textBaseline="middle"; dCtx.fillText("CHUNTAVERSE", 524, 256);
                    const dummyImg = new Image(); dummyImg.src = dummyCanvas.toDataURL();
                    dummyImg.onload = () => { loadedImgs.push(dummyImg); loadedCount++; if(loadedCount===adUrls.length) finalize(); };
                };
                img.src = url;
            });
        }

            const checkTex = new THREE.CanvasTexture(checkCanvas);

            const startLine = new THREE.Mesh(new THREE.PlaneGeometry(trackWidth, 4), new THREE.MeshBasicMaterial({ map: checkTex }));
            startLine.position.copy(p0); startLine.position.y = 0.03; 
            startLine.lookAt(p0.clone().add(t0)); startLine.rotation.x = -Math.PI/2;
            scene.add(startLine);

            const gantryGroup = new THREE.Group();
            const rightDir = new THREE.Vector3(t0.z, 0, -t0.x).normalize();

            const col1 = new THREE.Mesh(colGeo, colMat); col1.position.copy(p0).add(rightDir.clone().multiplyScalar(trackWidth/2 + 2)); col1.position.y = 12.5;
            const col2 = new THREE.Mesh(colGeo, colMat); col2.position.copy(p0).add(rightDir.clone().multiplyScalar(-trackWidth/2 - 2)); col2.position.y = 12.5;
            
            const beamGeo = new THREE.BoxGeometry(trackWidth + 6, 2, 1.5);

        function buildDrivers() {
            const arr = Array.from(selectedMembers).map(id => members.find(m => m.id === id));
            for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
            
            const maxCols = Math.ceil(arr.length / 2);
            const laneWidth = 8.0;

            arr.forEach((m, idx) => {
                const row = idx % 2; 
                const col = Math.floor(idx / 2);
                const totalColsInRow = (row === 1 && arr.length % 2 !== 0) ? maxCols - 1 : maxCols;
                const mid = (totalColsInRow - 1) / 2;
                
                const laneOffset = (col - mid) * laneWidth;
                const zOffset = row * 15 + 6;
                
                const group = new THREE.Group();
                const kart = new THREE.Group();
                group.add(kart);

                const cColor = new THREE.Color(m.color);
                const bMat = new THREE.MeshStandardMaterial({ color: cColor, roughness: 0.4, metalness: 0.4 });
                const dMat = new THREE.MeshStandardMaterial({ color: 0x15151e, roughness: 0.8 }); 

                const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3.2), bMat); body.position.y = 0.5; body.castShadow = true; kart.add(body);
                const nose = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1.4), bMat); nose.position.set(0, 0.4, 2.3); nose.castShadow = true; kart.add(nose);
                const fWing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.5), dMat); fWing.position.set(0, 0.3, 2.8); fWing.castShadow = true; kart.add(fWing);
                const rWing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.7), dMat); rWing.position.set(0, 1.2, -1.4); rWing.castShadow = true; kart.add(rWing);
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.2), dMat); pillar.position.set(0, 0.8, -1.4); kart.add(pillar);

                const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.3, 16);
                const wheels = [];
                [[-0.9, 0.45, 1.8], [0.9, 0.45, 1.8], [-0.9, 0.45, -1.2], [0.9, 0.45, -1.2]].forEach(pos => {
                    const w = new THREE.Mesh(wGeo, dMat);

                const tex = preloadedTextures[m.id];
                const fMat = new THREE.MeshStandardMaterial({ map: tex, color: 0xffffff });
                // 전후좌우 얼굴 표출 (Right=0, Left=1, Top=2, Bottom=3, Front=4, Back=5)
                const headMatArray = [fMat, fMat, bMat, dMat, fMat, fMat];
                const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), headMatArray);
                head.position.set(0, 1.3, -0.2); head.castShadow = true; kart.add(head);

                const cvs = document.createElement('canvas'); cvs.width = 512; cvs.height = 128;
                const cx = cvs.getContext('2d');
                cx.fillStyle = 'rgba(10,10,15,0.8)'; cx.fillRect(0,0,512,128);
                cx.fillStyle = m.color; cx.fillRect(0,0,16,128);
                cx.fillStyle = '#fff'; cx.font = `italic 900 80px 'Noto Sans KR', sans-serif`;
                cx.textAlign = 'center'; cx.textBaseline = 'middle'; cx.fillText(m.name, 256, 68);
                const nameTag = new THREE.Mesh(new THREE.PlaneGeometry(8, 2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cvs), transparent: true, depthTest: false }));
                nameTag.position.set(0, 4.5, 0); group.add(nameTag);
                
                // 카트 전체 크기 2.2배 확대

                // 스피드업 (랩타임 단축으로 속도 1.5배 증가)
                const targetLapTime = 51;
